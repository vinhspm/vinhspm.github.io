<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Bản Đồ Phỏng Vấn Java</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #222535;
            --border: #2e3147;
            --accent: #6c8fef;
            --accent2: #a78bfa;
            --green: #4ade80;
            --yellow: #fbbf24;
            --cyan: #38bdf8;
            --red: #f87171;
            --text: #e2e8f0;
            --muted: #8892a4;
            --code-bg: #131720;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif
        }

        .shell {
            display: flex;
            height: 100vh;
            overflow: hidden
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 240px;
            min-width: 240px;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border-right: 1px solid var(--border);
            overflow: hidden
        }

        .sb-top {
            padding: 14px 12px 10px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0
        }

        .logo {
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 10px;
            letter-spacing: -.3px
        }

        #search {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 7px;
            padding: 6px 10px;
            font-size: 0.8rem;
            outline: none
        }

        #search:focus {
            border-color: var(--accent)
        }

        #search::placeholder {
            color: var(--muted)
        }

        #nav {
            flex: 1;
            overflow-y: auto;
            padding: 6px 0 20px
        }

        #nav::-webkit-scrollbar {
            width: 4px
        }

        #nav::-webkit-scrollbar-track {
            background: transparent
        }

        #nav::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px
        }

        .nav-group {
            margin-bottom: 2px
        }

        .nav-cat {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 12px 4px;
            cursor: pointer;
            user-select: none
        }

        .nav-cat-icon {
            font-size: .8rem
        }

        .nav-cat-label {
            font-size: .68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--muted);
            flex: 1
        }

        .nav-cat-arrow {
            font-size: .6rem;
            color: var(--border);
            transition: transform .2s
        }

        .nav-group.open .nav-cat-arrow {
            transform: rotate(90deg);
            color: var(--muted)
        }

        .nav-items {
            display: none;
            padding-left: 0
        }

        .nav-group.open .nav-items {
            display: block
        }

        .nav-topic {
            display: flex;
            align-items: center;
            gap: 0;
            padding: 5px 12px 5px 18px;
            cursor: pointer;
            font-size: .82rem;
            color: var(--muted);
            transition: color .12s, background .12s;
            border-radius: 0
        }

        .nav-topic:hover {
            color: var(--text);
            background: var(--surface2)
        }

        .nav-topic.active {
            color: var(--accent);
            background: rgba(108, 143, 239, .1)
        }

        .nav-topic.has-subs {
            padding-left: 12px
        }

        .nav-tp-arrow {
            font-size: .55rem;
            color: var(--border);
            width: 10px;
            margin-right: 4px;
            transition: transform .15s;
            flex-shrink: 0
        }

        .nav-topic.sub-open .nav-tp-arrow {
            transform: rotate(90deg);
            color: var(--muted)
        }

        .nav-tp-name {
            flex: 1
        }

        .nav-subs {
            display: none
        }

        .nav-topic.sub-open+.nav-subs {
            display: block
        }

        .nav-sub {
            padding: 4px 12px 4px 32px;
            font-size: .77rem;
            color: var(--muted);
            cursor: pointer;
            transition: color .12s, background .12s
        }

        .nav-sub:hover {
            color: var(--text);
            background: var(--surface2)
        }

        .nav-sub.active {
            color: var(--accent);
            background: rgba(108, 143, 239, .08)
        }

        .nav-hidden {
            display: none !important
        }

        /* ── CONTENT ── */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 32px 32px
        }

        .content::-webkit-scrollbar {
            width: 6px
        }

        .content::-webkit-scrollbar-track {
            background: transparent
        }

        .content::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px
        }

        /* inner wrapper caps readable line length while still filling the area */
        .content>* {
            max-width: 820px
        }

        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
            color: var(--muted);
            max-width: 100% !important
        }

        .welcome-icon {
            font-size: 3rem;
            margin-bottom: 12px
        }

        .welcome h2 {
            font-size: 1.2rem;
            color: var(--text);
            margin-bottom: 6px
        }

        .welcome p {
            font-size: .9rem;
            max-width: 400px;
            line-height: 1.55
        }

        /* ── DETAIL ── */
        .d-crumb {
            font-size: .72rem;
            color: var(--muted);
            margin-bottom: 4px;
            letter-spacing: .02em
        }

        .d-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.2;
            color: var(--text)
        }

        .d-summary {
            background: var(--surface);
            border-left: 3px solid var(--accent);
            border-radius: 0 7px 7px 0;
            padding: 11px 15px;
            font-size: .92rem;
            color: var(--text);
            margin-bottom: 16px;
            line-height: 1.6
        }

        .d-section {
            margin-bottom: 16px
        }

        .d-section-title {
            font-size: .68rem;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--accent);
            margin-bottom: 7px;
            font-weight: 700
        }

        .d-points {
            display: flex;
            flex-direction: column;
            gap: 5px
        }

        .d-point {
            display: flex;
            gap: 7px;
            font-size: .9rem;
            line-height: 1.52
        }

        .d-point::before {
            content: '✦';
            color: var(--accent2);
            flex-shrink: 0;
            font-size: .6rem;
            margin-top: 4px
        }

        .d-point code {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1px 5px;
            font-size: .8em;
            font-family: monospace;
            color: var(--cyan)
        }

        .code-wrap {
            margin-bottom: 16px
        }

        .code-label {
            font-size: .71rem;
            color: var(--muted);
            margin-bottom: 5px;
            font-family: monospace
        }

        .code-block {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 18px;
            overflow-x: auto;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: .82rem;
            line-height: 1.65;
            white-space: pre
        }

        .c-kw {
            color: #c792ea
        }

        .c-str {
            color: #c3e88d
        }

        .c-num {
            color: #f78c6c
        }

        .c-ann {
            color: #ffcb6b
        }

        .c-cmt {
            color: #546e7a;
            font-style: italic
        }

        .c-type {
            color: #82aaff
        }

        .d-adapt {
            font-size: .9rem;
            line-height: 1.6
        }

        .d-adapt code {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1px 5px;
            font-size: .8em;
            font-family: monospace;
            color: var(--cyan)
        }

        .d-qs {
            display: flex;
            flex-direction: column;
            gap: 5px
        }

        .d-q {
            font-size: .855rem;
            color: var(--muted);
            padding: 7px 12px;
            background: var(--surface);
            border-radius: 7px;
            line-height: 1.48;
            border-left: 2px solid var(--border)
        }

        .d-q::before {
            content: 'Q: ';
            color: var(--yellow);
            font-weight: 700
        }
    </style>
</head>

            code: `import java.util.Objects;

// Abstraction: callers invoke process(), not the internal steps
public abstract class OrderProcessor {
    private final String processorId;
    private ProcessorStatus status = ProcessorStatus.IDLE;

    protected OrderProcessor(String processorId) {
        this.processorId = Objects.requireNonNull(processorId, "processorId required");
    }

    // Template Method — defines the skeleton; subclasses fill in the blanks
    public final ProcessingResult process(Order order) {
        validateOrder(order);                    // hook — subclass defines HOW
        ProcessingResult result = executeProcessing(order);
        this.status = result.isSuccess()
            ? ProcessorStatus.DONE : ProcessorStatus.FAILED;
        return result;
    }

    protected abstract void validateOrder(Order order);
    protected abstract ProcessingResult executeProcessing(Order order);

    // Encapsulation: controlled read-only access to internal state
    public ProcessorStatus getStatus() { return status; }
    public String getProcessorId()     { return processorId; }
}

// Inheritance + Polymorphism: concrete subclass fills in the contract
public class DigitalOrderProcessor extends OrderProcessor {
    private final EmailService emailService;

    public DigitalOrderProcessor(EmailService emailService) {
        super("digital-processor");
        this.emailService = Objects.requireNonNull(emailService);
    }

    @Override
    protected void validateOrder(Order order) {
        if (order.getItems().isEmpty())
            throw new IllegalArgumentException("Order must have at least one item");
    }

    @Override
    protected ProcessingResult executeProcessing(Order order) {
        emailService.sendDownloadLink(order.getCustomerEmail(), order.getItems());
        return ProcessingResult.success(order.getId());
    }
}

// --- Usage: caller works with the abstract type (Polymorphism) ---
OrderProcessor processor = new DigitalOrderProcessor(emailService);
ProcessingResult result = processor.process(order); // dispatched to DigitalOrderProcessor at runtime`,

            code: `import java.util.Objects;
import java.math.BigDecimal;

// Encapsulation: all state is private; behavior exposed via a clean API
public final class OrderItem {
    private final String productId;
    private final String productName;
    private int quantity;          // mutable — controlled via setter
    private final BigDecimal unitPrice;

    public OrderItem(String productId, String productName, int quantity, BigDecimal unitPrice) {
        // Validation lives in ONE place — invariants always upheld
        if (quantity <= 0) throw new IllegalArgumentException("Quantity must be > 0, got: " + quantity);
        if (unitPrice.compareTo(BigDecimal.ZERO) < 0)
            throw new IllegalArgumentException("Unit price cannot be negative");
        this.productId   = Objects.requireNonNull(productId);
        this.productName = Objects.requireNonNull(productName);
        this.quantity    = quantity;
        this.unitPrice   = unitPrice;
    }

    // Controlled mutation — enforces the same invariant as the constructor
    public void updateQuantity(int newQty) {
        if (newQty <= 0) throw new IllegalArgumentException("Quantity must be > 0");
        this.quantity = newQty;
    }

    // Computed behaviour — callers never need to know how total is calculated
    public BigDecimal totalPrice() {
        return unitPrice.multiply(BigDecimal.valueOf(quantity));
    }

    // Read-only accessors — no setter for productId/unitPrice (immutable business keys)
    public String getProductId()   { return productId; }
    public String getProductName() { return productName; }
    public int    getQuantity()    { return quantity; }
    public BigDecimal getUnitPrice() { return unitPrice; }
}

// --- Usage ---
OrderItem item = new OrderItem("P-001", "Laptop Pro", 2, new BigDecimal("1299.99"));
item.updateQuantity(3);
System.out.println(item.totalPrice()); // 3899.97 — caller never touches internal math`,

        };

//   └─ Old Gen (Tenured)           → Major/Full GC

// STACK (per thread): frames for each method call

    MemoryMXBean memBean = ManagementFactory.getMemoryMXBean();
    MemoryUsage heap = memBean.getHeapMemoryUsage();

            code: `// ---- Stack frame anatomy ----
// Each method call pushes ONE frame onto the current thread's stack.
// Frame holds: local variables array, operand stack, reference to constant pool.
// Frame is popped when the method returns (or throws).

public class OrderTreeProcessor {

    // BAD: recursive descent without depth guard → StackOverflowError on deep category trees
    public BigDecimal sumRecursive(CategoryNode node) {
        // Every call = 1 frame pushed; deep tree exhausts -Xss budget
        if (node == null) return BigDecimal.ZERO;
        BigDecimal subtotal = node.getProducts().stream()
            .map(Product::getPrice).reduce(BigDecimal.ZERO, BigDecimal::add);
        return node.getChildren().stream()
            .map(this::sumRecursive)          // each child = another frame
            .reduce(subtotal, BigDecimal::add);
    }

    // GOOD: iterative with explicit stack — O(depth) memory on heap, not JVM stack
    public BigDecimal sumIterative(CategoryNode root) {
        Deque<CategoryNode> stack = new ArrayDeque<>();
        stack.push(root);
        BigDecimal total = BigDecimal.ZERO;

        while (!stack.isEmpty()) {
            CategoryNode node = stack.pop();
            total = node.getProducts().stream()
                .map(Product::getPrice)
                .reduce(total, BigDecimal::add);
            node.getChildren().forEach(stack::push);  // children queued, not recursed
        }
        return total;
    }

    // Coexistence demo: stack vs heap ownership
    public Order buildOrder(String customerId) {
        // 'customerId' ref lives on stack (local variable in this frame)
        // The actual String object lives on HEAP
        String id = UUID.randomUUID().toString(); // id ref: stack; String: heap
        List<OrderItem> items = new ArrayList<>(); // items ref: stack; ArrayList: heap
        return new Order(id, customerId, items);   // Order object: heap; returned to caller
    }
}

            code: `import java.nio.file.*;
import java.io.IOException;

// ---- Parent Delegation Model ----
// When loading "com.example.Order":
//   ApplicationClassLoader → asks Platform (Extension) CL → asks Bootstrap CL
//   Bootstrap: "not my class" → Platform: "not mine" → Application: loads from classpath
// This prevents app code from replacing java.lang.String etc.

// ---- Custom ClassLoader: hot-reload discount rules at runtime ----
// Use case: business team updates DiscountStrategy .class files without restarting the app
public class RuleHotReloadClassLoader extends ClassLoader {
    private final Path ruleDir;

    public RuleHotReloadClassLoader(Path ruleDir, ClassLoader parent) {
        super(parent);   // always pass parent — preserves delegation chain
        this.ruleDir = ruleDir;
    }

    @Override
    protected Class<?> findClass(String name) throws ClassNotFoundException {
        // Only intercept rule classes; delegate everything else to parent
        if (!name.startsWith("com.example.rules.")) {
            return super.findClass(name);
        }

        Path classFile = ruleDir.resolve(name.replace('.', '/') + ".class");
        if (!Files.exists(classFile)) {
            throw new ClassNotFoundException("Rule class not found: " + name);
        }
        try {
            byte[] bytes = Files.readAllBytes(classFile);
            return defineClass(name, bytes, 0, bytes.length);
        } catch (IOException e) {
            throw new ClassNotFoundException("Failed to load rule: " + name, e);
        }
    }
}

// ---- Using the hot-reload loader ----
public class DiscountEngine {
    private volatile RuleHotReloadClassLoader ruleLoader;

    public DiscountEngine(Path rulesDir) {
        this.ruleLoader = new RuleHotReloadClassLoader(rulesDir, getClass().getClassLoader());
    }

    // Called when rule .class files change on disk
    public synchronized void reloadRules(Path rulesDir) {
        // Old loader (and the classes it defined) become eligible for GC
        this.ruleLoader = new RuleHotReloadClassLoader(rulesDir, getClass().getClassLoader());
    }

    public BigDecimal applyDiscount(Order order) throws Exception {
        Class<?> ruleClass = ruleLoader.loadClass("com.example.rules.SeasonalDiscount");
        DiscountRule rule = (DiscountRule) ruleClass.getDeclaredConstructor().newInstance();
        return rule.apply(order);
    }
}

    public static void clear()              { CTX.remove(); }

    public List<Order> getPendingOrders(List<Order> all) {

        List<Order> pending = new ArrayList<>();
        for (Order o : all) {

    public Set<String> uniqueCustomers(List<Order> orders) {

    public Map<OrderStatus, List<Order>> groupByStatus(List<Order> orders) {

            code: `import java.util.*;

// ---- ArrayList internal model ----
// Backed by Object[] array. add(E) at end → amortized O(1) (resize doubles capacity).
// get(index) → O(1) direct array access.
// add(0, e) / remove(0) → O(n) because it shifts all elements right.

// ---- LinkedList internal model ----
// Each node: {prev, data, next} — ~40 bytes of object overhead per element.
// addFirst / addLast → O(1) pointer update.
// get(index) → O(n) traversal from head or tail.
// Poor CPU cache locality: nodes scattered on heap, no sequential memory access.

public class OrderQueueDemo {

    // Use case 1: read-heavy list → ArrayList wins
    public BigDecimal calculateOrderTotal(String orderId) {
        // Fetched once, iterated multiple times → ArrayList ideal
        List<OrderItem> items = orderRepository.findItems(orderId); // returns ArrayList
        BigDecimal total = BigDecimal.ZERO;
        for (int i = 0; i < items.size(); i++) {      // O(1) each get(i)
            total = total.add(items.get(i).totalPrice());
        }
        return total;
    }

    // Use case 2: frequent head removal → LinkedList as Deque (or ArrayDeque, even better)
    public void processOrderQueue() {
        // LinkedList as a queue — O(1) addLast and removeFirst
        Deque<Order> queue = new LinkedList<>();
        loadPendingOrders().forEach(queue::addLast);

        while (!queue.isEmpty()) {
            Order next = queue.removeFirst();  // O(1)
            processOrder(next);
        }
    }

    // Use case 3: Real-world recommendation — use ArrayDeque, not LinkedList
    public void processOrderQueueBetter() {
        // ArrayDeque: O(1) head/tail ops + better cache locality than LinkedList
        Deque<Order> queue = new ArrayDeque<>(loadPendingOrders());
        while (!queue.isEmpty()) {
            processOrder(queue.poll());
        }
    }

    // Quick benchmark illustration (approximate, JVM warm-up matters)
    public static void benchmark() {
        int N = 50_000;
        List<Order> arr  = new ArrayList<>();
        Deque<Order> deq = new ArrayDeque<>();

        // Prepend to ArrayList: O(n) per op → O(n²) total — very slow
        long t = System.nanoTime();
        for (int i = 0; i < N; i++) arr.add(0, new Order(String.valueOf(i), "C1"));
        System.out.printf("ArrayList prepend %,d times: %dms%n", N, (System.nanoTime()-t)/1_000_000);

        // Prepend to ArrayDeque: O(1) per op → O(n) total — fast
        t = System.nanoTime();
        for (int i = 0; i < N; i++) deq.addFirst(new Order(String.valueOf(i), "C1"));
        System.out.printf("ArrayDeque prepend %,d times: %dms%n", N, (System.nanoTime()-t)/1_000_000);
        // Typical: ArrayList ~2000ms vs ArrayDeque ~5ms for 50K prepends
    }
}`,

// ---- Correct equals/hashCode for a domain key ----
// ProductKey represents a (category, sku) composite key used in catalog maps
public final class ProductKey {
    private final String categoryId;
    private final String sku;

    public ProductKey(String categoryId, String sku) {
        this.categoryId = Objects.requireNonNull(categoryId);
        this.sku        = Objects.requireNonNull(sku);
    }

    // hashCode must be consistent with equals:
    // if a.equals(b) then a.hashCode() == b.hashCode()
    @Override
    public int hashCode() {
        return Objects.hash(categoryId, sku);  // combines both fields
    }

    // equals must be reflexive, symmetric, transitive, consistent, null-safe
    @Override
    public boolean equals(Object o) {
        if (this == o) return true;                  // same reference
        if (!(o instanceof ProductKey other)) return false;
        return categoryId.equals(other.categoryId) && sku.equals(other.sku);
    }

    @Override public String toString() { return categoryId + "/" + sku; }
}

public class ProductCatalog {
    private final Map<ProductKey, Product> catalog = new HashMap<>();

    public void addProduct(Product product) {
        ProductKey key = new ProductKey(product.getCategoryId(), product.getSku());
        catalog.put(key, product);
    }

    public Optional<Product> findProduct(String categoryId, String sku) {
        // Works correctly because equals/hashCode are defined
        return Optional.ofNullable(catalog.get(new ProductKey(categoryId, sku)));
    }
}

// ---- ConcurrentHashMap Java 8+ internals ----
// - Empty bucket: CAS to insert Node (no lock)
// - Non-empty bucket: synchronized on bucket head node only (fine-grained lock)

// ---- Use case 1: concurrent request counter per customer ----
public class CustomerRequestTracker {
    // Thread-safe: concurrent increments from multiple request-handling threads
    private final ConcurrentHashMap<String, Long> requestCounts = new ConcurrentHashMap<>();

    public void recordRequest(String customerId) {
        // merge is ATOMIC: read current, apply (Long::sum), write back — no race
        requestCounts.merge(customerId, 1L, Long::sum);
    }

    public long getCount(String customerId) {
        return requestCounts.getOrDefault(customerId, 0L);
    }
}

// ---- Use case 2: lazy-initialized session cache ----
public class SessionCache {
    private final ConcurrentHashMap<String, UserSession> sessions = new ConcurrentHashMap<>();

    public UserSession getOrCreate(String sessionId, String userId) {
        // computeIfAbsent is ATOMIC: only one thread executes the lambda per key
        // even if 100 threads request the same sessionId simultaneously
        return sessions.computeIfAbsent(sessionId,
            id -> new UserSession(id, userId, Instant.now()));
    }

    public void invalidate(String sessionId) {
        sessions.remove(sessionId);
    }
}

public class OrderStatusAggregator {

        = new ConcurrentHashMap<>();

    public void index(Order order) {
        // computeIfAbsent + CopyOnWriteArrayList = concurrent safe indexing
        statusIndex
            .computeIfAbsent(order.getStatus(), k -> new CopyOnWriteArrayList<>())
            .add(order.getId());
    }

    public List<String> getOrderIds(OrderStatus status) {

import java.util.concurrent.*;

// ---- TreeMap: sorted by key — red-black tree, O(log n) ops ----
public class OrderScheduler {
    // Keys are scheduled timestamps; TreeMap keeps them sorted automatically
    private final TreeMap<Long, List<Order>> schedule = new TreeMap<>();

    public void scheduleOrder(Order order, long scheduledTimeMs) {
        schedule.computeIfAbsent(scheduledTimeMs, k -> new ArrayList<>()).add(order);
    }

    // Get all orders due NOW or earlier (range query — only possible with TreeMap)
    public List<Order> getDueOrders() {
        long now = System.currentTimeMillis();
        // headMap: all entries with key <= now (exclusive upper bound)
        NavigableMap<Long, List<Order>> due = schedule.headMap(now, true);
        List<Order> result = due.values().stream()
            .flatMap(Collection::stream).toList();
        due.clear();  // remove processed entries
        return result;
    }

    // O(log n) lookups: firstKey(), lastKey(), floorKey(), ceilingKey()
    public long nextScheduledTime() {
        return schedule.isEmpty() ? -1 : schedule.firstKey();
    }
}

// Use case 1: maintain ordered display of recently viewed products
public class RecentlyViewedProducts {
    // accessOrder=true: get() moves entry to tail → tail = most recently accessed
    private final int MAX_SIZE = 10;

    private final LinkedHashMap<String, Product> viewed = new LinkedHashMap<>(16, 0.75f, true) {
        @Override
        protected boolean removeEldestEntry(Map.Entry<String, Product> eldest) {
            return size() > MAX_SIZE;  // evict least-recently-accessed when over limit
        }
    };

    public synchronized void view(Product product) {
        viewed.put(product.getId(), product);    // access-order: moved to tail
    }

    // Returns products oldest-viewed first, newest last
    public synchronized List<Product> getRecentlyViewed() {
        return new ArrayList<>(viewed.values());
    }
}

// ---- try-with-resources: multiple resources, correct close order ----
// Resources are closed in REVERSE declaration order: rs → ps → conn
public class OrderRepository {

    private final DataSource dataSource;

    public Order findById(long orderId) {
        String sql = "SELECT id, customer_id, status, total FROM orders WHERE id = ?";

        try (Connection conn = dataSource.getConnection();         // closed 3rd
             PreparedStatement ps = conn.prepareStatement(sql)) {  // closed 2nd

            ps.setLong(1, orderId);

            try (ResultSet rs = ps.executeQuery()) {               // closed 1st
                if (rs.next()) {
                    return mapRow(rs);
                }
                throw new OrderNotFoundException(orderId);
            }
        } catch (SQLException e) {
            // Wrap checked exception → domain unchecked — callers don't handle SQL
            throw new DataAccessException("Failed to load order #" + orderId, e);
        }
        // conn, ps, rs are ALL guaranteed closed even if exception is thrown
    }

    // ---- Processing large result set — streaming approach ----
    public void exportOrdersToFile(Path outputPath) throws IOException {
        String sql = "SELECT id, total FROM orders WHERE status = 'COMPLETED'";

        try (Connection conn = dataSource.getConnection();
             PreparedStatement ps = conn.prepareStatement(sql);
             ResultSet rs = ps.executeQuery();
             BufferedWriter writer = Files.newBufferedWriter(outputPath)) {

            ps.setFetchSize(500);  // stream in batches of 500 from DB
            while (rs.next()) {
                writer.write(rs.getLong("id") + "," + rs.getBigDecimal("total"));
                writer.newLine();
            }
        } catch (SQLException e) {
            throw new DataAccessException("Export failed", e);
        }
        // conn, ps, rs, writer all auto-closed — no resource leak
    }

    private Order mapRow(ResultSet rs) throws SQLException {
        return new Order(

            rs.getString("customer_id"),
            OrderStatus.valueOf(rs.getString("status")),
            rs.getBigDecimal("total")

    }
}`,

// ---- Unchecked exception: programming errors / invariant violations ----
public class Order {
    private final String orderId;
    private OrderStatus status;

    public Order(String orderId) {
        // Precondition violation → caller's bug → IllegalArgumentException
        if (orderId == null || orderId.isBlank())
            throw new IllegalArgumentException("orderId must not be blank");
        this.orderId = orderId;
        this.status  = OrderStatus.PENDING;
    }

    public void cancel() {
        // State invariant → IllegalStateException
        if (status == OrderStatus.SHIPPED || status == OrderStatus.DELIVERED)
            throw new IllegalStateException(
                "Cannot cancel order #" + orderId + " in status " + status);
        this.status = OrderStatus.CANCELLED;
    }

    public void applyDiscount(double percent) {
        // Range validation → IllegalArgumentException (not an I/O error — always unchecked)
        if (percent < 0 || percent > 100)
            throw new IllegalArgumentException("Discount percent must be 0–100, got: " + percent);
    }
}

import java.io.*;

// ---- Custom AutoCloseable 1: operation timer for performance tracking ----
public class OperationTimer implements AutoCloseable {
    private final String operationName;
    private final long startNanos = System.nanoTime();

    public OperationTimer(String operationName) {
        this.operationName = operationName;
    }

    @Override
    public void close() {
        long elapsedMs = (System.nanoTime() - startNanos) / 1_000_000;
        // In production: record metric instead of println
        MetricsRegistry.recordLatency(operationName, elapsedMs);
        if (elapsedMs > 500) {
            log.warn("Slow operation '{}': {}ms", operationName, elapsedMs);
        }
    }
}

// ---- Custom AutoCloseable 2: database transaction scope ----
public class TransactionScope implements AutoCloseable {
    private final Connection conn;
    private boolean committed = false;

    public TransactionScope(DataSource ds) throws SQLException {
        this.conn = ds.getConnection();
        this.conn.setAutoCommit(false);
    }

    public Connection getConnection() { return conn; }

    public void commit() throws SQLException {
        conn.commit();
        committed = true;
    }

    @Override
    public void close() throws SQLException {
        try {
            if (!committed) {
                conn.rollback();  // auto-rollback if commit() was never called
            }
        } finally {
            conn.close();         // always release connection to pool
        }
    }
}

import java.util.concurrent.locks.*;

// ---- Observing all 6 thread states in Order processing context ----
public class ThreadLifecycleDemo {

    private final Object orderLock = new Object();

    public void demonstrateStates() throws InterruptedException {

        // ---- State 1: NEW ----
        Thread orderProcessor = new Thread(() -> {
            System.out.println("[1] RUNNABLE: processing order...");

            // ---- State 4: TIMED_WAITING (Thread.sleep) ----
            try {
                Thread.sleep(2000);   // simulate I/O wait
            } catch (InterruptedException e) {
                // CORRECT interrupt handling: restore flag so callers can check it
                Thread.currentThread().interrupt();
                System.out.println("Thread interrupted — stopping gracefully");
                return;
            }
            System.out.println("[2] RUNNABLE: order processed");
        }, "order-processor-1");

        System.out.println("State after new:  " + orderProcessor.getState()); // NEW

        // ---- State 2: RUNNABLE ----
        orderProcessor.start();
        Thread.sleep(50);  // let it start
        System.out.println("State after start: " + orderProcessor.getState()); // RUNNABLE

        // Give it a moment to reach sleep()
        Thread.sleep(100);
        System.out.println("State while sleeping: " + orderProcessor.getState()); // TIMED_WAITING

        // ---- State 3: BLOCKED (waiting for monitor lock) ----
        synchronized (orderLock) {
            Thread blocker = new Thread(() -> {
                synchronized (orderLock) {  // tries to acquire lock held by main thread
                    System.out.println("Got lock");
                }
            }, "order-blocker");

            blocker.start();
            Thread.sleep(50);
            System.out.println("Blocker state:  " + blocker.getState()); // BLOCKED
        } // main releases lock → blocker transitions BLOCKED → RUNNABLE

        // ---- State 5: WAITING (join) ----
        Thread waiter = new Thread(() -> {
            try {
                orderProcessor.join();  // WAITING indefinitely until orderProcessor dies
            } catch (InterruptedException e) {
                Thread.currentThread().interrupt();
            }
        }, "order-waiter");
        waiter.start();
        Thread.sleep(50);
        System.out.println("Waiter state:   " + waiter.getState()); // WAITING

        // ---- State 6: TERMINATED ----
        orderProcessor.join();
        System.out.println("Final state:    " + orderProcessor.getState()); // TERMINATED
    }
}

public static void printThreadStats() {
    ThreadMXBean bean = ManagementFactory.getThreadMXBean();
    System.out.printf("Threads — total: %d  peak: %d  daemon: %d%n",
        bean.getThreadCount(), bean.getPeakThreadCount(), bean.getDaemonThreadCount());

            info.getThreadState() == Thread.State.WAITING) {
            System.out.printf("  [%s] %s → waiting on: %s%n",
                info.getThreadState(), info.getThreadName(), info.getLockName());
        }
    }

// ---- Synchronization at different granularities ----
public class OrderInventoryManager {
    private final Map<String, Integer> stock = new HashMap<>();      // productId → qty
    private final Map<String, BigDecimal> prices = new HashMap<>();  // productId → price
    private final Object stockLock  = new Object();   // dedicated lock for stock
    private final Object priceLock  = new Object();   // separate lock for prices

    // Method-level lock (coarse): locks entire object for the whole method
    // Use when: method touches MULTIPLE fields that form a single invariant
    public synchronized boolean transferStock(String fromProduct, String toProduct, int qty) {
        int fromQty = stock.getOrDefault(fromProduct, 0);
        if (fromQty < qty) return false;   // check-then-act — must be atomic
        stock.put(fromProduct, fromQty - qty);
        stock.put(toProduct, stock.getOrDefault(toProduct, 0) + qty);
        return true;
    }

    // Block-level lock (fine-grained): only lock around the critical section
    // Allows stock and price updates to proceed CONCURRENTLY
    public void updateStock(String productId, int delta) {
        synchronized (stockLock) {         // lock only stock — not prices
            int current = stock.getOrDefault(productId, 0);
            if (current + delta < 0)
                throw new IllegalArgumentException("Stock cannot go negative: " + productId);
            stock.put(productId, current + delta);
        }
        // Price lock is free during stock update — higher concurrency
    }

    public void updatePrice(String productId, BigDecimal newPrice) {
        synchronized (priceLock) {         // independent of stock lock
            prices.put(productId, newPrice);
        }
    }

    // Use for static shared state (e.g., global counter)

    public static synchronized void recordProcessed() {
        totalOrdersProcessed++;    // lock is OrderInventoryManager.class

    // Read lock pitfall: need to sync reads too if writes are synchronized
    public int getStock(String productId) {
        synchronized (stockLock) {         // MUST sync — HashMap not thread-safe for reads under concurrent writes
            return stock.getOrDefault(productId, 0);
        }
    }

// Pattern 1: synchronized instance method — guards 'this' object state
public class OrderIdGenerator {
    private long nextId = 1000L;

    // Reentrant: if allocateBatch() calls nextOrderId() internally, same thread
    // re-enters the monitor without deadlocking
    public synchronized long nextOrderId() {
        return nextId++;                   // read → increment → write — all atomic

    public synchronized long[] allocateBatch(int count) {
        long[] ids = new long[count];
        for (int i = 0; i < count; i++) {
            ids[i] = nextOrderId();        // re-enters synchronized — safe (reentrant)

        return ids;
    }
}

public class OrderSearchIndex {

// ---- wait/notify: low-level producer-consumer for Order processing queue ----
// Modern code should use BlockingQueue, but interviews WILL ask about this.

public class OrderProcessingBuffer {
    private final Queue<Order> queue = new LinkedList<>();
    private final int capacity;
    private volatile boolean shutdown = false;

    public OrderProcessingBuffer(int capacity) {
        this.capacity = capacity;
    }

    // PRODUCER: called by HTTP handler threads accepting new orders
    public synchronized void submit(Order order) throws InterruptedException {
        // MUST use while loop (not if) — guards against SPURIOUS WAKEUP
        // Spurious wakeup: thread woken without notify() — while re-checks condition
        while (queue.size() >= capacity && !shutdown) {
            wait();     // atomically releases monitor AND suspends thread
        }
        if (shutdown) throw new IllegalStateException("Buffer is shut down");
        queue.add(order);
        notifyAll();    // wake ALL waiting threads — they re-check their condition
        // (notifyAll preferred over notify: notify may wake wrong thread)
    }

    // CONSUMER: called by worker threads pulling orders to process
    public synchronized Order take() throws InterruptedException {
        while (queue.isEmpty() && !shutdown) {
            wait();     // releases monitor; re-acquires it when notified
        }
        if (queue.isEmpty()) return null;  // shutdown with empty queue
        Order order = queue.poll();
        notifyAll();    // wake producers that may be waiting on capacity
        return order;
    }

    // Shutdown signal — wakes all waiting threads
    public synchronized void shutdown() {
        this.shutdown = true;
        notifyAll();    // all blocked threads will see shutdown=true and exit
    }

    // ---- Correct interrupt handling pattern ----
    public void workerLoop() {
        while (!Thread.currentThread().isInterrupted()) {
            try {
                Order order = take();
                if (order == null) break;    // shutdown
                processOrder(order);
            } catch (InterruptedException e) {
                // DO NOT swallow! Restore the flag so the caller can check it.
                Thread.currentThread().interrupt();
                break;
            }
        }
    }
}

import java.util.concurrent.*;
import java.util.*;

// ---- ReentrantLock vs synchronized ----
// Use ReentrantLock when you need:
//   tryLock() — acquire without blocking (avoid deadlock)
//   tryLock(timeout) — timed acquisition
//   lockInterruptibly() — respond to Thread.interrupt()
//   Multiple Condition queues per lock
//   Fairness (FIFO ordering)

public class OrderCheckoutService {

    // Two separate Condition variables on ONE lock — impossible with synchronized
    private final ReentrantLock lock     = new ReentrantLock(true); // fair=true: FIFO
    private final Condition paymentReady = lock.newCondition();
    private final Condition inventoryOk  = lock.newCondition();

    private final Queue<Order> paymentQueue   = new LinkedList<>();
    private final Queue<Order> inventoryQueue = new LinkedList<>();

    // ---- tryLock with timeout: avoid deadlock on payment gateway ----
    public PaymentResult processPayment(Order order, long timeoutMs)
            throws InterruptedException {
        // Try to acquire lock within timeout — back off instead of deadlocking
        if (!lock.tryLock(timeoutMs, TimeUnit.MILLISECONDS)) {
            return PaymentResult.timeout("Payment processing timed out");
        }
        try {
            return paymentGateway.charge(order);
        } finally {
            lock.unlock();   // MUST be in finally — otherwise lock is held forever
        }
    }

    // ---- lockInterruptibly: allow cancellation while waiting ----
    public void reserveInventory(Order order) throws InterruptedException {
        lock.lockInterruptibly();  // can be cancelled by Thread.interrupt()
        try {
            while (!inventoryService.hasStock(order)) {
                // Await on specific condition — only signal this when inventory changes
                inventoryOk.await(5, TimeUnit.SECONDS);
            }
            inventoryService.reserve(order);
            paymentReady.signal();  // notify payment thread that inventory is secured
        } finally {
            lock.unlock();
        }
    }

    public void waitForPayment(Order order) throws InterruptedException {
        lock.lock();
        try {
            while (!paymentService.isPaid(order)) {
                paymentReady.await();  // waits on paymentReady condition only
                // Other threads waiting on inventoryOk are NOT disturbed
            }
        } finally {
            lock.unlock();
        }
    }

    // ---- Fair lock for equal-priority checkout requests ----
    public int getQueueLength() {
        lock.lock();
        try {
            return lock.getQueueLength();  // ReentrantLock exposes this; synchronized does not
        } finally {
            lock.unlock();
        }
    }
}`,

// ---- volatile: visibility guarantee for single-writer, multi-reader ----

// Use case 1: status flag shared between control thread and worker threads
public class OrderBatchWorker implements Runnable {
    // volatile: writes flushed to main memory; reads bypass CPU cache
    private volatile boolean running  = true;
    private volatile boolean paused   = false;

    @Override
    public void run() {
        while (running) {        // running read fresh from main memory each iteration
            if (paused) {
                Thread.yield();  // give up CPU while paused
                continue;
            }
            processNextBatch();
        }
        System.out.println("Worker stopped cleanly");
    }

    // Control methods: called from a different thread (e.g., admin endpoint)
    public void stop()   { running = false; }  // volatile write: immediately visible to run()
    public void pause()  { paused  = true;  }
    public void resume() { paused  = false; }
}

// Use case 3: AtomicReference — lock-free cart state update
public class ShoppingCart {
    // Immutable snapshot — replaced atomically on each update
    private final AtomicReference<CartSnapshot> snapshot;

    public ShoppingCart(String customerId) {
        this.snapshot = new AtomicReference<>(CartSnapshot.empty(customerId));
    }

    // CAS loop: optimistic update — no lock, but retry if another thread updated first
    public void addItem(OrderItem item) {
        CartSnapshot current, updated;
        do {
            current = snapshot.get();
            updated = current.withItem(item);    // creates new immutable snapshot
        } while (!snapshot.compareAndSet(current, updated));
        // If compareAndSet fails: another thread modified cart between get() and CAS
        // Retry with the fresh 'current' — eventually one attempt will win
    }

    public CartSnapshot getSnapshot() { return snapshot.get(); }
}

    private final AtomicInteger availableStock;

        this.availableStock = new AtomicInteger(initialStock);
    }

    // Pattern 1: simple decrement and return old value
    public int reserveOne() {
        return availableStock.getAndDecrement();   // returns value BEFORE decrement

    // Cannot use simple addAndGet(-qty) — need to check precondition atomically
    public boolean reserve(int qty) {
        int current, updated;
        do {
            current = availableStock.get();
            if (current < qty) return false;   // not enough stock — no update needed
            updated = current - qty;
        } while (!availableStock.compareAndSet(current, updated));
        // compareAndSet fails if another thread changed 'current' between get() and CAS
        // Loop retries with fresh 'current' → eventually one thread wins
        return true;
    }

            code: `import java.util.concurrent.atomic.*;

// ---- CAS (Compare-And-Swap) internals and patterns ----

// What CAS does at CPU level (x86 CMPXCHG instruction):
// if (mem == expected) { mem = newValue; return true; }
// else                 { return false; }          // all ATOMIC — no interrupt possible

// ---- Pattern 1: manual CAS loop — what AtomicInteger.addAndGet() does internally ----
public class OrderCreditBalance {
    private final AtomicLong balanceCents = new AtomicLong(0);

    // Deposit: thread-safe add without lock
    public long deposit(long amountCents) {
        long expected, updated;
        do {
            expected = balanceCents.get();       // read current value
            updated  = expected + amountCents;   // compute desired value
            // If another thread changed balanceCents between get() and CAS → retry
        } while (!balanceCents.compareAndSet(expected, updated));
        return updated;
    }

    // Withdraw only if sufficient balance (compound condition — needs CAS loop)
    public boolean withdraw(long amountCents) {
        long expected, updated;
        do {
            expected = balanceCents.get();
            if (expected < amountCents) return false;  // insufficient — abort
            updated  = expected - amountCents;
        } while (!balanceCents.compareAndSet(expected, updated));
        return true;
    }
}

// ---- ABA Problem ----
// Thread 1 reads value = A
// Thread 2 changes A → B → A  (two CAS ops)
// Thread 1's CAS sees A == A → succeeds, but state is NOT the same as when T1 read it!
// This matters for linked-list-based lock-free structures (node reuse)

// ---- ABA Fix: AtomicStampedReference — adds version counter ----
public class OrderStateManager {
    // Pair: (state, version) — CAS checks BOTH state AND version
    private final AtomicStampedReference<OrderStatus> statusRef =
        new AtomicStampedReference<>(OrderStatus.PENDING, 0);

    public boolean transitionStatus(OrderStatus expectedStatus, OrderStatus newStatus) {
        int[] stampHolder = new int[1];
        OrderStatus current = statusRef.get(stampHolder);  // reads both value and stamp

        if (current != expectedStatus) return false;

        // CAS on (value, stamp) pair — even if value reverts to expectedStatus,
        // the stamp will have changed → CAS fails → no false success
        return statusRef.compareAndSet(
            expectedStatus, newStatus,
            stampHolder[0], stampHolder[0] + 1   // increment version
        );
    }

    public OrderStatus getStatus() {
        return statusRef.getReference();
    }

    public int getVersion() {
        return statusRef.getStamp();
    }
}

            code: `import java.util.concurrent.*;
import java.util.concurrent.atomic.*;

// ---- Production-ready ThreadPoolExecutor for Order processing ----
public class OrderProcessingPool {

    private final ThreadPoolExecutor pool;

    public OrderProcessingPool() {
        AtomicInteger threadNumber = new AtomicInteger(1);

        this.pool = new ThreadPoolExecutor(
            4,                              // corePoolSize: always keep 4 threads alive
            8,                              // maximumPoolSize: burst up to 8 under load
            60L, TimeUnit.SECONDS,          // keepAliveTime: idle threads above core shrink after 60s
            new LinkedBlockingQueue<>(200), // bounded queue: max 200 tasks waiting
                                            // NEVER use unbounded queue in production — OOM risk
            r -> {                          // ThreadFactory: named threads for thread dumps
                Thread t = new Thread(r, "order-worker-" + threadNumber.getAndIncrement());
                t.setDaemon(true);          // daemon: JVM can exit without waiting for these
                t.setUncaughtExceptionHandler((thread, ex) ->
                    log.error("Unhandled exception in {}", thread.getName(), ex));
                return t;
            },
            new ThreadPoolExecutor.CallerRunsPolicy()
            // CallerRunsPolicy: when queue full, CALLER thread runs the task
            // This provides natural backpressure — slows down the producer
            // Alternatives:
            //   AbortPolicy (default): throws RejectedExecutionException
            //   DiscardPolicy: silently drops task (data loss!)
            //   DiscardOldestPolicy: drops oldest queued task
        );

        // Allow core threads to time out too (reduce idle threads during off-peak)
        pool.allowCoreThreadTimeOut(true);
    }

    public Future<ProcessingResult> submitOrder(Order order) {
        return pool.submit(() -> {
            try {
                return processOrder(order);
            } catch (Exception e) {
                log.error("Failed to process order {}", order.getId(), e);
                throw e;  // propagated to Future.get() as ExecutionException
            }
        });
    }

    // ---- Health metrics for Micrometer / Prometheus ----
    public void exposeMetrics(MeterRegistry registry) {
        Gauge.builder("thread.pool.active",   pool, ThreadPoolExecutor::getActiveCount).register(registry);
        Gauge.builder("thread.pool.queued",   pool, p -> p.getQueue().size()).register(registry);
        Gauge.builder("thread.pool.size",     pool, ThreadPoolExecutor::getPoolSize).register(registry);
        Counter.builder("thread.pool.completed").register(registry);
    }

    // ---- Graceful shutdown ----
    public void shutdown() throws InterruptedException {
        pool.shutdown();                           // stop accepting new tasks
        if (!pool.awaitTermination(30, TimeUnit.SECONDS)) {
            log.warn("Pool did not terminate in 30s — forcing shutdown");
            pool.shutdownNow();                    // interrupt in-flight tasks
            if (!pool.awaitTermination(10, TimeUnit.SECONDS))
                log.error("Pool did not terminate after shutdownNow");
        }
    }
}`,

            code: `import java.util.concurrent.*;
import java.util.*;
import java.util.stream.*;

// ---- ExecutorService patterns in Order / Reporting domain ----
public class OrderReportService {

    private final ExecutorService executor = Executors.newFixedThreadPool(
        Runtime.getRuntime().availableProcessors(),
        r -> new Thread(r, "report-worker")
    );

    // ---- Pattern 1: invokeAll — run all tasks, wait for ALL to complete ----
    public List<RegionReport> generateAllRegionReports(List<String> regionIds) throws InterruptedException {
        List<Callable<RegionReport>> tasks = regionIds.stream()
            .<Callable<RegionReport>>map(regionId -> () -> buildRegionReport(regionId))
            .toList();

        List<Future<RegionReport>> futures = executor.invokeAll(tasks, 60, TimeUnit.SECONDS);

        List<RegionReport> results = new ArrayList<>();
        for (Future<RegionReport> f : futures) {
            try {
                results.add(f.get());   // blocks until this task's result is ready
            } catch (ExecutionException e) {
                log.error("Report task failed", e.getCause());
                results.add(RegionReport.empty());  // partial failure: return empty report
            } catch (CancellationException e) {
                log.warn("Report task timed out and was cancelled");
                results.add(RegionReport.empty());
            }
        }
        return results;
    }

    // ---- Pattern 2: invokeAny — return the FIRST successful result ----
    // Use case: query multiple read replicas, return fastest response
    public Order fetchOrderFast(long orderId, List<String> replicaUrls) throws Exception {
        List<Callable<Order>> queries = replicaUrls.stream()
            .<Callable<Order>>map(url -> () -> replicaClient.fetch(url, orderId))
            .toList();

        // invokeAny: submits all, cancels remaining when first succeeds
        return executor.invokeAny(queries, 5, TimeUnit.SECONDS);
    }

    // ---- Pattern 3: submit + Future with timeout ----
    public Optional<PricingResult> getPricingWithTimeout(Order order) {
        Future<PricingResult> future = executor.submit(() -> pricingEngine.calculate(order));
        try {
            return Optional.of(future.get(2, TimeUnit.SECONDS));
        } catch (TimeoutException e) {
            future.cancel(true);    // interrupt the pricing thread
            log.warn("Pricing timed out for order {}", order.getId());
            return Optional.empty();
        } catch (ExecutionException e) {
            log.error("Pricing failed", e.getCause());
            return Optional.empty();
        } catch (InterruptedException e) {
            Thread.currentThread().interrupt();
            return Optional.empty();
        }
    }

    // ---- Proper shutdown ----
    @PreDestroy
    public void shutdown() throws InterruptedException {
        executor.shutdown();
        if (!executor.awaitTermination(30, TimeUnit.SECONDS)) {
            executor.shutdownNow();
        }
    }
}`,

// ---- Deadlock scenario: transferring between two Order accounts ----

        Account first  = from.getId() < to.getId() ? from : to;
        Account second = from.getId() < to.getId() ? to   : from;

        synchronized (first) {
            synchronized (second) {
                from.debit(amount);
                to.credit(amount);

        ReentrantLock toLock   = getLock(to);

        // Try to acquire both locks within 500ms — if timeout → abort, retry later
        if (fromLock.tryLock(500, TimeUnit.MILLISECONDS)) {

                    try {

                        to.credit(amount);

                    } finally { toLock.unlock(); }

        log.warn("Could not acquire locks for transfer from {} to {} — will retry", from.getId(), to.getId());
        return false;  // caller should retry with backoff

            code: `import java.util.concurrent.*;
import java.util.concurrent.locks.*;
import java.util.*;

// ---- Starvation: high-priority orders starve low-priority ones ----

public class OrderDispatcher {

    // Unfair lock (default): when lock is released, ANY waiting thread can acquire it
    // High-traffic "VIP" threads may win repeatedly → background threads starve
    private final ReentrantLock unfairLock = new ReentrantLock();          // default: fair=false
    private final ReentrantLock fairLock   = new ReentrantLock(true);      // FIFO ordering

    // Starvation demo: background report threads starve under VIP order burst
    public void processWithUnfairLock(boolean isVip) {
        unfairLock.lock();
        try {
            // VIP orders flood the lock → background threads wait indefinitely
            processOrder();
        } finally {
            unfairLock.unlock();
        }
    }

    // Fix: fair lock — threads acquire in the order they requested it
    public void processWithFairLock(boolean isVip) {
        fairLock.lock();   // FIFO: background threads no longer starved
        try {
            processOrder();
        } finally {
            fairLock.unlock();
        }
    }

    // ---- Livelock: two order processors yield to each other forever ----
    // Neither makes progress, but both are "active" (not blocked/waiting)
    public boolean tryFulfillOrderLivelock(OrderProcessor p1, OrderProcessor p2, Order order) {
        for (int attempt = 0; attempt < 100; attempt++) {
            if (p1.tryReserve(order)) {
                if (p2.tryReserve(order)) {
                    p1.fulfill(order);
                    p2.fulfill(order);
                    return true;
                }
                p1.release(order);   // release to let p2 try → p2 also releases → infinite courtesy
            }
            // Each processor keeps yielding when it sees the other is also trying
        }
        return false;  // livelock: 100 attempts, no progress
    }

    // Fix for livelock: exponential backoff with JITTER — breaks symmetry
    private final Random rng = new Random();

    public boolean tryFulfillOrderFixed(OrderProcessor p1, OrderProcessor p2, Order order)
            throws InterruptedException {
        int backoffMs = 10;
        for (int attempt = 0; attempt < 8; attempt++) {
            if (p1.tryReserve(order)) {
                if (p2.tryReserve(order)) {
                    p1.fulfill(order);
                    p2.fulfill(order);
                    return true;
                }
                p1.release(order);
            }
            // Jitter: randomize backoff so threads don't retry at exactly the same time
            int jitter = rng.nextInt(backoffMs);
            Thread.sleep(backoffMs + jitter);
            backoffMs = Math.min(backoffMs * 2, 1000);   // cap at 1s
        }
        return false;  // give up — caller retries at a higher level
    }
}`,

//
// JMM allows CPU and compiler to:
//  1. Cache variable values in CPU registers / L1-L2 cache (visibility problem)
//  2. Reorder instructions for performance (ordering problem)
//
// Without explicit synchronization, threads CAN see stale or partially-written state.

// Thread A (writer):         Thread B (reader):
// order = new Order(...);    if (order != null) {
//                                process(order.getTotal()); // MAY crash!
//                            }
//
// Why: CPU may publish 'order' reference BEFORE fully constructing the object.
// Thread B sees non-null reference but reads uninitialized fields → NPE or corrupt data.

// FIX 1: volatile reference ensures full construction is visible before reference is published
public class OrderPublisher {
    private volatile Order latestOrder = null;    // volatile: write barriers around assignment

    public void publishOrder(Order order) {
        // All writes to 'order' fields happen-before the volatile write of 'latestOrder'
        this.latestOrder = order;   // volatile write — flushes all previous writes to main memory
    }

    public Order getLatestOrder() {
        return latestOrder;         // volatile read — sees the fully constructed order
    }
}

    private volatile double taxRate = 0.1;

// ---- happens-before (hb) rules in JMM ----
// If A hb B: all writes done by A are visible to B, in program order.
// hb is TRANSITIVE: A hb B and B hb C → A hb C

// ---- Rule 1: Program Order — within a single thread ----

    private String lastUpdatedBy;

    // synchronized unlock of setStatus hb lock of getStatus

    public synchronized void setStatus(OrderStatus s, String updatedBy) {
        this.status        = s;
        this.lastUpdatedBy = updatedBy;
    }

// ---- Rule 3: volatile write hb volatile read ----
public class OrderReadinessGate {

    private Order            bootstrapOrder;         // NOT volatile — piggybacks on volatile

// Bug: JIT compiler may hoist 'active' check OUTSIDE the loop → infinite loop!
// On x86 this sometimes "works" (strong memory model), but fails on ARM/Power.
public class OrderWorkerBroken {
    private boolean active = true;   // NOT volatile

    public void run() {
        // JIT optimization: "active never changes inside the loop" → hoists to:
        //   boolean localActive = active;
        //   while (localActive) { ... }   ← infinite loop, never sees active=false
        while (active) {
            processNextOrder();
        }
    }
    public void stop() { active = false; }  // write may never reach the other thread's cache

// Fix: volatile forces fresh read from main memory on every loop iteration
public class OrderWorker {
    private volatile boolean active = true;

    public void run() {
        while (active) {              // volatile read: checks main memory each iteration
            processNextOrder();
        }
        System.out.println("Worker stopped cleanly");
    }
    public void stop() { active = false; }  // volatile write: immediately visible to all threads
}

// Classic example: "store-store / load-load" reorder (possible on weak memory model CPUs)
public class OrderEventPublisher {
    private int    orderTotal = 0;
    private volatile boolean published = false;   // ONLY 'published' is volatile

    // Publisher thread:
    public void publish(int total) {
        orderTotal = total;    // (1) write to non-volatile field
        published  = true;     // (2) volatile WRITE creates a memory fence
        // JMM guarantee: (1) cannot be reordered after (2)
        // All writes before volatile write are visible after volatile read

    // Subscriber thread:
    public void consume() {
        if (published) {       // (3) volatile READ: memory fence here too
            // (4) read non-volatile — safe because of hb: (1) hb (2) hb (3) hb (4)
            System.out.println("Order total: " + orderTotal);
        }
    }
}

@Component
public class ProductCatalogCache implements InitializingBean, DisposableBean {

    private final ProductRepository productRepository;   // injected by Spring
    private final ScheduledExecutorService scheduler = Executors.newSingleThreadScheduledExecutor();
    private volatile ConcurrentHashMap<String, Product> cache;

    // 1. CONSTRUCTOR — called first; dependencies NOT yet injected
    //    DO NOT call productRepository here — it's still null!
    public ProductCatalogCache(ProductRepository productRepository) {
        this.productRepository = productRepository;
        System.out.println("Step 1: Constructor called — productRepository injected via constructor");
    }

    // 2. @PostConstruct — called AFTER all @Autowired injections are complete
    //    Safe to use all dependencies here
    @PostConstruct
    public void init() {
        System.out.println("Step 2: @PostConstruct — loading cache from DB");
        cache = new ConcurrentHashMap<>();
        // All products loaded at startup for fast lookup
        productRepository.findAll().forEach(p -> cache.put(p.getId(), p));

        // Schedule periodic refresh every 5 minutes
        scheduler.scheduleAtFixedRate(this::refresh, 5, 5, TimeUnit.MINUTES);
        System.out.println("Cache initialized with " + cache.size() + " products");
    }

    // Alternative to @PostConstruct: implements InitializingBean
    @Override
    public void afterPropertiesSet() {
        // Called by Spring after @PostConstruct — avoid using both; prefer @PostConstruct
        System.out.println("Step 3: afterPropertiesSet() (InitializingBean)");
    }

    public Product getProduct(String productId) {
        // Step 4: Bean is READY — serving requests
        return cache.get(productId);
    }

    private void refresh() {
        productRepository.findAll().forEach(p -> cache.put(p.getId(), p));
    }

    // 5. @PreDestroy — called when ApplicationContext is shutting down
    @PreDestroy
    public void shutdown() {
        System.out.println("Step 5: @PreDestroy — flushing cache and stopping scheduler");
        scheduler.shutdown();   // stop background refresh
        cache.clear();          // release memory
    }

    // Alternative to @PreDestroy: implements DisposableBean
    @Override
    public void destroy() {
        System.out.println("Step 6: DisposableBean.destroy() — also called on shutdown");
    }
}

import io.micrometer.core.instrument.*;
import org.springframework.stereotype.*;

// ---- 1. Custom HealthIndicator — adds to /actuator/health ----
// Use for: external API, message broker, payment gateway, cache connectivity
@Component
public class PaymentGatewayHealthIndicator implements HealthIndicator {

    private final PaymentGatewayClient paymentClient;

    public PaymentGatewayHealthIndicator(PaymentGatewayClient paymentClient) {
        this.paymentClient = paymentClient;
    }

    @Override
    public Health health() {
        try {
            // Lightweight ping — must complete quickly (health check timeout is typically 1–2s)
            PaymentGatewayStatus status = paymentClient.ping();
            return Health.up()
                .withDetail("gateway",       "Stripe")
                .withDetail("latencyMs",     status.getLatencyMs())
                .withDetail("environment",   status.getEnvironment())
                .build();
        } catch (PaymentGatewayException e) {
            // DOWN signals Kubernetes readiness probe to stop routing traffic here
            return Health.down()
                .withDetail("gateway", "Stripe")
                .withDetail("error",   e.getMessage())
                .withDetail("code",    e.getErrorCode())
                .build();
        }
    }
}
// GET /actuator/health returns:

@Service
public class OrderMetricsService {
    private final Counter ordersPlaced;
    private final Counter ordersFailed;
    private final Timer   orderProcessingTime;

    public OrderMetricsService(MeterRegistry meterRegistry) {
        // Counters increment; timers record duration distribution
        this.ordersPlaced = Counter.builder("orders.placed")
            .description("Total orders successfully placed")
            .tag("service", "order")
            .register(meterRegistry);

        this.ordersFailed = Counter.builder("orders.failed")
            .description("Total order placement failures")
            .tag("service", "order")
            .register(meterRegistry);

        this.orderProcessingTime = Timer.builder("order.processing.duration")
            .description("Time to complete order processing")
            .publishPercentiles(0.5, 0.95, 0.99)   // p50, p95, p99 latency
            .register(meterRegistry);
    }

    public Order placeOrder(CreateOrderRequest req) {
        return orderProcessingTime.record(() -> {
            try {
                Order order = doPlaceOrder(req);
                ordersPlaced.increment();
                return order;
            } catch (Exception e) {
                ordersFailed.increment(Tags.of("reason", e.getClass().getSimpleName()));
                throw e;
            }
        });
    }
}

// ---- @RestController: combines @Controller + @ResponseBody ----
// Every method returns data serialized to JSON (via Jackson), not a view name
@RestController
@RequestMapping("/api/v1/orders")
public class OrderController {

    private final OrderService orderService;

    // Constructor injection — no @Autowired needed in Spring Boot
    public OrderController(OrderService orderService) {
        this.orderService = orderService;
    }

    // GET /api/v1/orders/{id}
    // ResponseEntity gives full control over status code + headers + body
    @GetMapping("/{id}")
    public ResponseEntity<OrderDto> getOrder(@PathVariable Long id) {
        return orderService.findById(id)
            .map(order -> ResponseEntity.ok(OrderDto.from(order)))     // 200 OK with body
            .orElse(ResponseEntity.notFound().build());                  // 404 No Body
    }

    // GET /api/v1/orders?status=PENDING&page=0&size=20
    @GetMapping
    public ResponseEntity<Page<OrderDto>> listOrders(
            @RequestParam(defaultValue = "PENDING") String status,
            @RequestParam(defaultValue = "0")       int page,
            @RequestParam(defaultValue = "20")      int size) {

        Pageable pageable = PageRequest.of(page, size, Sort.by("createdAt").descending());
        Page<OrderDto> orders = orderService.findByStatus(status, pageable)
                                            .map(OrderDto::from);
        return ResponseEntity.ok(orders);
    }

    // POST /api/v1/orders
    // @Valid triggers Bean Validation on the request body
    // @RequestBody deserializes JSON → CreateOrderRequest via Jackson
    @PostMapping
    public ResponseEntity<OrderDto> createOrder(@RequestBody @Valid CreateOrderRequest request) {
        Order order = orderService.placeOrder(request);
        // 201 Created with Location header pointing to the new resource
        URI location = URI.create("/api/v1/orders/" + order.getId());
        return ResponseEntity.created(location).body(OrderDto.from(order));
    }

    // PATCH /api/v1/orders/{id}/cancel
    @PatchMapping("/{id}/cancel")
    public ResponseEntity<OrderDto> cancelOrder(@PathVariable Long id,
                                                 @RequestBody @Valid CancelOrderRequest request) {
        Order cancelled = orderService.cancelOrder(id, request.getReason());
        return ResponseEntity.ok(OrderDto.from(cancelled));
    }

    // DELETE /api/v1/orders/{id}
    @DeleteMapping("/{id}")
    @ResponseStatus(HttpStatus.NO_CONTENT)    // 204 — fixed status, no ResponseEntity needed
    public void deleteOrder(@PathVariable Long id) {
        orderService.delete(id);
    }
}

// ---- Interceptor: timing + request logging (runs INSIDE Spring context) ----
@Component
public class RequestLoggingInterceptor implements HandlerInterceptor {

    private static final Logger log = LoggerFactory.getLogger(RequestLoggingInterceptor.class);
    // ThreadLocal: each request thread has its own start time
    private final ThreadLocal<Long> startTime = new ThreadLocal<>();

    // Step 3: called before controller — return false to abort (e.g. failed auth check)
    @Override
    public boolean preHandle(HttpServletRequest request,
                             HttpServletResponse response,
                             Object handler) {
        startTime.set(System.currentTimeMillis());

        // Access handler metadata — only possible with interceptors (not filters)
        if (handler instanceof HandlerMethod handlerMethod) {
            log.debug("→ [{}.{}] {} {}",
                handlerMethod.getBeanType().getSimpleName(),
                handlerMethod.getMethod().getName(),
                request.getMethod(),
                request.getRequestURI());
        }
        return true; // continue processing; return false to send 401/403 and stop chain
    }

    // Step 5: called after controller returns — model is available, response not yet written
    @Override
    public void postHandle(HttpServletRequest request,
                           HttpServletResponse response,
                           Object handler,
                           ModelAndView modelAndView) {
        // Rarely used for REST APIs (no ModelAndView); useful for MVC apps to inject view data
        response.addHeader("X-Served-By", "order-service");
    }

    // Step 6: called after response committed — always runs (even on exception)
    @Override
    public void afterCompletion(HttpServletRequest request,
                                HttpServletResponse response,
                                Object handler,
                                Exception ex) {
        long elapsed = System.currentTimeMillis() - startTime.get();
        startTime.remove(); // CRITICAL: clean up ThreadLocal to prevent memory leak

        if (ex != null) {
            log.error("✗ {} {} → {} ({}ms) [exception: {}]",
                request.getMethod(), request.getRequestURI(),
                response.getStatus(), elapsed, ex.getMessage());
        } else {
            log.info("✓ {} {} → {} ({}ms)",
                request.getMethod(), request.getRequestURI(),
                response.getStatus(), elapsed);
        }
    }
}

// ---- Register interceptor via WebMvcConfigurer ----
@Configuration
public class WebMvcConfig implements WebMvcConfigurer {

    private final RequestLoggingInterceptor loggingInterceptor;

    public WebMvcConfig(RequestLoggingInterceptor loggingInterceptor) {
        this.loggingInterceptor = loggingInterceptor;
    }

    @Override
    public void addInterceptors(InterceptorRegistry registry) {
        registry.addInterceptor(loggingInterceptor)
                .addPathPatterns("/api/**")          // apply to all API endpoints
                .excludePathPatterns(               // skip these (already handled by security)
                    "/api/v1/auth/**",
                    "/actuator/**"
                );
    }
}`,

// ========== FILTER (Servlet API level) ==========
// Runs BEFORE DispatcherServlet — no access to Spring MVC concepts (handler, model)
// Use for: CORS, auth token extraction, request/response transformation, correlation ID

// @Order controls filter execution order (lower = earlier)
@Component
@Order(1)
public class CorrelationIdFilter extends OncePerRequestFilter {
    // OncePerRequestFilter ensures doFilterInternal() is called exactly once per request
    // (prevents duplicate execution in async dispatch)

    private static final String HEADER = "X-Correlation-Id";
    private static final String MDC_KEY = "correlationId";

    @Override
    protected void doFilterInternal(HttpServletRequest request,
                                    HttpServletResponse response,
                                    FilterChain filterChain) throws ServletException, IOException {
        // Extract from header or generate a new one
        String correlationId = Optional.ofNullable(request.getHeader(HEADER))
                                       .filter(h -> !h.isBlank())
                                       .orElse(UUID.randomUUID().toString());
        try {
            // Put in MDC so ALL log statements in this request include it automatically
            MDC.put(MDC_KEY, correlationId);
            // Echo correlation ID back in the response so clients can trace their request
            response.setHeader(HEADER, correlationId);
            filterChain.doFilter(request, response); // continue chain
        } finally {
            MDC.remove(MDC_KEY); // ALWAYS clean up MDC — prevents leaking into next request
        }
    }
}

// Second filter: log raw request body size BEFORE Spring parses it
@Component
@Order(2)
public class RequestAuditFilter extends OncePerRequestFilter {
    @Override
    protected void doFilterInternal(HttpServletRequest request,
                                    HttpServletResponse response,
                                    FilterChain filterChain) throws ServletException, IOException {
        int contentLength = request.getContentLength();
        if (contentLength > 10 * 1024 * 1024) { // 10 MB limit
            response.sendError(HttpServletResponse.SC_REQUEST_ENTITY_TOO_LARGE,
                "Request body exceeds 10 MB limit");
            return; // stop chain — DO NOT call filterChain.doFilter()
        }
        filterChain.doFilter(request, response);
    }
}

// Runs INSIDE DispatcherServlet — has access to handler method + annotations
// Use for: role-based access on specific controller methods, per-handler logging

@Component
public class AdminAccessInterceptor implements HandlerInterceptor {

    private final SecurityContextService securityContextService;

    public AdminAccessInterceptor(SecurityContextService securityContextService) {
        this.securityContextService = securityContextService;
    }

    @Override
    public boolean preHandle(HttpServletRequest request,
                             HttpServletResponse response,
                             Object handler) throws Exception {
        if (handler instanceof HandlerMethod handlerMethod) {
            // Access method-level annotation — IMPOSSIBLE in a filter
            RequiresAdminAccess annotation = handlerMethod.getMethodAnnotation(RequiresAdminAccess.class);
            if (annotation != null) {
                if (!securityContextService.currentUserIsAdmin()) {
                    response.sendError(HttpServletResponse.SC_FORBIDDEN,
                        "Admin access required for: " + handlerMethod.getMethod().getName());
                    return false; // abort — controller method is NOT called
                }
            }
        }
        return true;
    }
}
