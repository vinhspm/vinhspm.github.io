@RestControllerAdvice
@Slf4j
public class GlobalExceptionHandler {

    // ---- Domain exceptions: map to specific HTTP status ----

    @ExceptionHandler(OrderNotFoundException.class)
    @ResponseStatus(HttpStatus.NOT_FOUND)                          // 404
    public ErrorResponse handleOrderNotFound(OrderNotFoundException ex,
                                              HttpServletRequest request) {
        log.warn("Order not found: orderId={}", ex.getOrderId());
        // NOTE: safe to include ex.getMessage() — it only contains order ID, not internal details
        return ErrorResponse.of("ORDER_NOT_FOUND", ex.getMessage(), request.getRequestURI());
    }

    @ExceptionHandler(PaymentFailedException.class)
    public ResponseEntity<ErrorResponse> handlePaymentFailed(PaymentFailedException ex,
                                                               HttpServletRequest request) {
        // Use ResponseEntity when status is dynamic (e.g. depends on exception fields)
        log.error("Payment failed: gatewayCode={}, amount={}", ex.getGatewayCode(), ex.getAmountCents());
        ErrorResponse body = ErrorResponse.of("PAYMENT_FAILED",
            "Payment could not be processed. Please try again.",  // NEVER expose gateway details
            request.getRequestURI());
        return ResponseEntity.status(HttpStatus.PAYMENT_REQUIRED).body(body);    // 402
    }

    @ExceptionHandler(IllegalStateException.class)
    @ResponseStatus(HttpStatus.CONFLICT)                           // 409 — e.g. cancel SHIPPED order
    public ErrorResponse handleConflict(IllegalStateException ex, HttpServletRequest request) {
        log.warn("Business rule violation: {}", ex.getMessage());
        return ErrorResponse.of("BUSINESS_RULE_VIOLATION", ex.getMessage(), request.getRequestURI());
    }

    // ---- Spring MVC validation: @Valid on @RequestBody fails ----
    @ExceptionHandler(MethodArgumentNotValidException.class)
    @ResponseStatus(HttpStatus.BAD_REQUEST)                        // 400
    public ErrorResponse handleValidation(MethodArgumentNotValidException ex,
                                          HttpServletRequest request) {
        // Collect all field errors into a readable message
        String details = ex.getBindingResult().getFieldErrors().stream()
            .map(fe -> fe.getField() + ": " + fe.getDefaultMessage())
            .collect(Collectors.joining("; "));
        log.debug("Validation failed: {}", details);
        return ErrorResponse.of("VALIDATION_FAILED",
            "Request validation failed: " + details,
            request.getRequestURI());
    }

    // ---- Database constraint violation (e.g. duplicate order ID) ----
    @ExceptionHandler(DataIntegrityViolationException.class)
    @ResponseStatus(HttpStatus.CONFLICT)                           // 409
    public ErrorResponse handleDataIntegrity(DataIntegrityViolationException ex,
                                              HttpServletRequest request) {
        // DO NOT expose raw SQL error — log internally, return generic message
        log.error("Data integrity violation at {}: {}", request.getRequestURI(), ex.getMessage());
        return ErrorResponse.of("DATA_CONFLICT",
            "A resource with the same unique identifier already exists.",
            request.getRequestURI());
    }

    // ---- Catch-all: last resort for unexpected exceptions ----
    @ExceptionHandler(Exception.class)
    @ResponseStatus(HttpStatus.INTERNAL_SERVER_ERROR)              // 500
    public ErrorResponse handleAll(Exception ex, HttpServletRequest request) {
        // Log full stack trace server-side — NEVER send it to the client
        log.error("Unhandled exception at {}", request.getRequestURI(), ex);
        return ErrorResponse.of("INTERNAL_ERROR",
            "An unexpected error occurred. Please contact support.",
            request.getRequestURI());
        // Response: {"code":"INTERNAL_ERROR","message":"An unexpected...","timestamp":"...","path":"/api/v1/orders"}
    }
}`,

// ---- Spring Security filter chain configuration for a stateless REST API ----
@Configuration
@EnableWebSecurity
@EnableMethodSecurity(prePostEnabled = true)   // enables @PreAuthorize on service methods
public class SecurityConfig {

    private final JwtAuthenticationFilter jwtAuthFilter;

    public SecurityConfig(JwtAuthenticationFilter jwtAuthFilter) {
        this.jwtAuthFilter = jwtAuthFilter;
    }

    @Bean
    public SecurityFilterChain filterChain(HttpSecurity http) throws Exception {
        return http
            // ---- Session management: STATELESS = no HTTP session, no JSESSIONID cookie ----
            .sessionManagement(sm -> sm.sessionCreationPolicy(SessionCreationPolicy.STATELESS))

            // ---- CSRF: disabled for REST API (tokens replace cookie-based auth) ----
            .csrf(csrf -> csrf.disable())

            // ---- URL-based authorization rules ----
            .authorizeHttpRequests(auth -> auth
                // Public endpoints — no token required
                .requestMatchers("/api/v1/auth/**").permitAll()
                .requestMatchers("/actuator/health", "/actuator/info").permitAll()

                // Admin-only endpoints
                .requestMatchers("/api/v1/admin/**").hasRole("ADMIN")

                // Order endpoints require CUSTOMER or ADMIN role
                .requestMatchers(HttpMethod.POST, "/api/v1/orders").hasAnyRole("CUSTOMER", "ADMIN")
                .requestMatchers(HttpMethod.GET,  "/api/v1/orders/**").authenticated()

                // All other requests require authentication
                .anyRequest().authenticated()
            )

            // ---- Add JWT filter BEFORE Spring's built-in UsernamePasswordAuthenticationFilter ----
            // Our filter validates the Bearer token and populates SecurityContext
            .addFilterBefore(jwtAuthFilter, UsernamePasswordAuthenticationFilter.class)

            // ---- Custom 401/403 handlers for clean JSON error responses ----
            .exceptionHandling(ex -> ex
                .authenticationEntryPoint((request, response, e) -> {
                    // 401: request had no token or invalid token
                    response.setContentType("application/json");
                    response.setStatus(401);
                    response.getWriter().write("""
                        {"code":"UNAUTHORIZED","message":"Authentication required"}""");
                })
                .accessDeniedHandler((request, response, e) -> {
                    // 403: valid token but insufficient role
                    response.setContentType("application/json");
                    response.setStatus(403);
                    response.getWriter().write("""
                        {"code":"FORBIDDEN","message":"Insufficient permissions"}""");
                })
            )
            .build();
    }

    // ---- BCrypt password encoder — NEVER store plaintext passwords ----
    // Cost factor 12: ~250ms per hash (makes brute-force impractical)
    @Bean
    public BCryptPasswordEncoder passwordEncoder() {
        return new BCryptPasswordEncoder(12);
    }

    // ---- AuthenticationManager: wires UserDetailsService + PasswordEncoder ----
    @Bean
    public AuthenticationManager authenticationManager(
            AuthenticationConfiguration config) throws Exception {
        return config.getAuthenticationManager();
    }
}

import io.jsonwebtoken.security.Keys;
import org.springframework.beans.factory.annotation.Value;
import org.springframework.security.core.userdetails.*;
import org.springframework.security.web.authentication.WebAuthenticationDetailsSource;
import org.springframework.web.filter.OncePerRequestFilter;

// ---- JWT Filter: validates token on every request ----
@Component
public class JwtAuthenticationFilter extends OncePerRequestFilter {

    private final JwtTokenProvider tokenProvider;
    private final UserDetailsService userDetailsService;

    public JwtAuthenticationFilter(JwtTokenProvider tokenProvider,
                                    UserDetailsService userDetailsService) {
        this.tokenProvider    = tokenProvider;
        this.userDetailsService = userDetailsService;
    }

    @Override
    protected void doFilterInternal(HttpServletRequest request,
                                    HttpServletResponse response,
                                    FilterChain filterChain) throws ServletException, IOException {
        String token = extractToken(request);

        // Only process if token exists and SecurityContext has no authentication yet
        if (token != null && SecurityContextHolder.getContext().getAuthentication() == null) {
            if (tokenProvider.validateToken(token)) {
                String username = tokenProvider.getUsername(token);
                UserDetails userDetails = userDetailsService.loadUserByUsername(username);

                UsernamePasswordAuthenticationToken auth =
                    new UsernamePasswordAuthenticationToken(
                        userDetails, null, userDetails.getAuthorities());
                // Attach request details (IP, session) to the authentication object
                auth.setDetails(new WebAuthenticationDetailsSource().buildDetails(request));

                // Store in SecurityContext — downstream controllers can call
                // SecurityContextHolder.getContext().getAuthentication() to get this
                SecurityContextHolder.getContext().setAuthentication(auth);
            }
            // If validateToken() fails: token is expired/tampered → no auth set → 401 from SecurityConfig
        }
        filterChain.doFilter(request, response);
    }

    // Extract "Bearer <token>" from Authorization header
    private String extractToken(HttpServletRequest request) {
        String header = request.getHeader("Authorization");
        return (header != null && header.startsWith("Bearer ")) ? header.substring(7) : null;
    }
}

// ---- JWT Token Provider: generate and validate tokens ----
@Component
public class JwtTokenProvider {

    @Value("\${jwt.secret}")
    private String secret;                // 256-bit secret from env var / secrets manager

    @Value("\${jwt.access-token-expiry-ms:900000}")   // 15 minutes default
    private long accessTokenExpiryMs;

    @Value("\${jwt.refresh-token-expiry-ms:604800000}") // 7 days default
    private long refreshTokenExpiryMs;

    // Generate access token (short-lived — 15 min)
    public String generateAccessToken(UserDetails user) {
        return buildToken(user, accessTokenExpiryMs, "access");
    }

    // Generate refresh token (long-lived — 7 days)
    public String generateRefreshToken(UserDetails user) {
        return buildToken(user, refreshTokenExpiryMs, "refresh");
    }

    private String buildToken(UserDetails user, long expiryMs, String tokenType) {
        return Jwts.builder()
            .setSubject(user.getUsername())
            .claim("roles", user.getAuthorities().stream()
                .map(a -> a.getAuthority()).toList())
            .claim("type", tokenType)
            .setIssuedAt(new Date())
            .setExpiration(new Date(System.currentTimeMillis() + expiryMs))
            // HS256: symmetric — same secret signs and verifies (single-service setup)
            // For microservices: use RS256 — private key signs, public key verifies
            .signWith(Keys.hmacShaKeyFor(secret.getBytes()))
            .compact();
        // Result: "eyJhbGci....eyJzdWIi....SflKxwRJSMeKKF2Q"
        //          HEADER    PAYLOAD  SIGNATURE (Base64URL-encoded)
    }

    public String getUsername(String token) {
        return parseClaims(token).getSubject();
    }

    public boolean validateToken(String token) {
        try {
            parseClaims(token);
            return true;
        } catch (ExpiredJwtException e) {
            log.warn("JWT expired: {}", e.getMessage());
        } catch (JwtException e) {
            log.warn("Invalid JWT: {}", e.getMessage());
        }
        return false;
    }

    private Claims parseClaims(String token) {
        return Jwts.parserBuilder()
            .setSigningKey(Keys.hmacShaKeyFor(secret.getBytes()))
            .build()
            .parseClaimsJws(token)
            .getBody();
    }
}

// ---- AuthController: login endpoint that issues JWT ----
@RestController
@RequestMapping("/api/v1/auth")
public class AuthController {
    private final AuthenticationManager authManager;
    private final JwtTokenProvider      tokenProvider;
    private final UserDetailsService    userDetailsService;

    @PostMapping("/login")
    public ResponseEntity<TokenResponse> login(@RequestBody @Valid LoginRequest request) {
        // Throws BadCredentialsException if username/password don't match
        authManager.authenticate(
            new UsernamePasswordAuthenticationToken(request.email(), request.password()));

        UserDetails user = userDetailsService.loadUserByUsername(request.email());
        return ResponseEntity.ok(new TokenResponse(
            tokenProvider.generateAccessToken(user),
            tokenProvider.generateRefreshToken(user)
        ));
    }
}

import org.springframework.security.oauth2.server.resource.authentication.*;
import org.springframework.security.oauth2.jwt.*;

// ---- OAuth2 Roles:
// Resource Owner  = the user (owns their order data)
// Client          = your frontend / mobile app requesting access
// Authorization Server = Keycloak / Okta / AWS Cognito (issues tokens)
// Resource Server = this Order Service API (validates tokens, serves resources)

// ---- Option A: Resource Server — validates JWT from external Authorization Server ----
// Use when: integrating with Keycloak, Okta, Google, Auth0, AWS Cognito
@Configuration
@EnableWebSecurity
public class OAuth2ResourceServerConfig {

    @Bean
    public SecurityFilterChain filterChain(HttpSecurity http) throws Exception {
        return http
            .sessionManagement(sm -> sm.sessionCreationPolicy(SessionCreationPolicy.STATELESS))
            .csrf(csrf -> csrf.disable())
            .authorizeHttpRequests(auth -> auth
                .requestMatchers("/api/v1/public/**").permitAll()
                .requestMatchers("/api/v1/orders/**").hasAuthority("SCOPE_orders:read")
                .requestMatchers(HttpMethod.POST, "/api/v1/orders").hasAuthority("SCOPE_orders:write")
                .requestMatchers("/api/v1/admin/**").hasRole("ADMIN")
                .anyRequest().authenticated()
            )
            // Configure JWT validation — Spring fetches JWKS automatically and caches it
            .oauth2ResourceServer(oauth2 -> oauth2
                .jwt(jwt -> jwt
                    .decoder(jwtDecoder())
                    .jwtAuthenticationConverter(jwtAuthConverter())
                )
            )
            .build();
    }

    @Bean
    public JwtDecoder jwtDecoder() {
        // NimbusJwtDecoder fetches public keys from the Authorization Server's JWKS endpoint
        // and caches them for signature verification — no private key needed here
        return NimbusJwtDecoder
            .withJwkSetUri("https://keycloak.example.com/realms/order-realm/protocol/openid-connect/certs")
            .build();
    }

    @Bean
    public JwtAuthenticationConverter jwtAuthConverter() {
        // Map Keycloak-specific "realm_access.roles" claim → Spring Security GrantedAuthority
        JwtGrantedAuthoritiesConverter rolesConverter = new JwtGrantedAuthoritiesConverter();
        rolesConverter.setAuthoritiesClaimName("realm_access.roles");  // Keycloak structure
        rolesConverter.setAuthorityPrefix("ROLE_");                    // maps "ADMIN" → "ROLE_ADMIN"

        JwtAuthenticationConverter converter = new JwtAuthenticationConverter();
        converter.setJwtGrantedAuthoritiesConverter(rolesConverter);
        return converter;
    }
}

            .apply(oauth2.oauth2Configuration())

// ---- Authentication vs Authorization ----
// Authentication: "Who are you?" — verify identity via JWT signature / password
// Authorization:  "What can you do?" — check roles/permissions of the verified identity

// ---- 1. URL-level authorization (in SecurityConfig) ----

// ---- 2. Method-level authorization with @PreAuthorize ----
// Fine-grained: SpEL expression evaluated at the method boundary
@Service
@Slf4j
public class OrderService {

    // Only ADMIN or the order's own customer can view the order
    // #customerId refers to the method parameter named "customerId"
    @PreAuthorize("hasRole('ADMIN') or #customerId == authentication.principal.username")
    public Order getOrder(Long orderId, String customerId) {
        return orderRepository.findById(orderId)
            .filter(o -> o.getCustomerId().equals(customerId) || isAdmin())
            .orElseThrow(() -> new OrderNotFoundException(orderId));
    }

    // Only users with "orders:write" scope/authority can place an order
    @PreAuthorize("hasAuthority('SCOPE_orders:write')")
    public Order placeOrder(CreateOrderRequest request) {
        // authentication is guaranteed non-null here — @PreAuthorize blocks unauthenticated calls
        String currentUser = getCurrentUsername();
        log.info("Placing order for user: {}", currentUser);
        return orderRepository.save(Order.from(request, currentUser));
    }

    // ADMIN only: refund any order regardless of customer ownership
    @PreAuthorize("hasRole('ADMIN')")
    public RefundResult refundOrder(Long orderId, String reason) {
        Order order = orderRepository.findById(orderId)
            .orElseThrow(() -> new OrderNotFoundException(orderId));
        return paymentGateway.refund(order.getPaymentId(), order.totalAmount(), reason);
    }

    // @PostAuthorize: method executes, THEN Spring checks the returned object
    // Use when you need the return value in the authorization decision
    @PostAuthorize("returnObject.customerId == authentication.principal.username or hasRole('ADMIN')")
    public Order getOrderById(Long orderId) {
        // Order is fetched first, then checked: is it the caller's own order?
        return orderRepository.findById(orderId)
            .orElseThrow(() -> new OrderNotFoundException(orderId));
    }
}

@Service
public class PaymentService {

    public PaymentResult processRefund(Long orderId, BigDecimal amount) {
        // Access current authentication from SecurityContext (thread-local)
        Authentication auth = SecurityContextHolder.getContext().getAuthentication();

        if (auth == null || !auth.isAuthenticated()) {
            throw new AccessDeniedException("Authentication required");
        }

        String currentUser = auth.getName();  // principal username

        // Check roles programmatically
        boolean isAdmin = auth.getAuthorities().stream()
            .anyMatch(a -> a.getAuthority().equals("ROLE_ADMIN"));

        Order order = orderRepository.findById(orderId)
            .orElseThrow(() -> new OrderNotFoundException(orderId));

        // Custom business rule: customers can self-refund only within 24h
        if (!isAdmin) {
            if (!order.getCustomerId().equals(currentUser)) {
                throw new AccessDeniedException("Cannot refund another customer's order");
            }
            if (order.getCreatedAt().isBefore(Instant.now().minus(24, ChronoUnit.HOURS))) {
                throw new AccessDeniedException("Refund window (24h) has expired");
            }
        }

        return paymentGateway.refund(order.getPaymentId(), amount);
    }

    private String getCurrentUsername() {
        return SecurityContextHolder.getContext().getAuthentication().getName();
    }
}

// ---- Aspect: @Around intercepts method, measures time, logs slow calls ----
@Aspect
@Component
@Slf4j
public class PerformanceMonitoringAspect {

    private final MeterRegistry meterRegistry;

    public PerformanceMonitoringAspect(MeterRegistry meterRegistry) {
        this.meterRegistry = meterRegistry;
    }

    // Pointcut: any method annotated with @TrackExecutionTime
    // "trackExecutionTime" is the annotation object bound to the advice parameter
    @Around("@annotation(trackExecutionTime)")
    public Object measureExecutionTime(ProceedingJoinPoint joinPoint,
                                       TrackExecutionTime trackExecutionTime) throws Throwable {
        String className  = joinPoint.getTarget().getClass().getSimpleName();
        String methodName = joinPoint.getSignature().getName();
        String operation  = trackExecutionTime.operation().isBlank()
                            ? className + "." + methodName
                            : trackExecutionTime.operation();

        long startNanos = System.nanoTime();
        boolean success = true;

        try {
            // Proceed: actually invoke the original method with its original arguments
            Object result = joinPoint.proceed();
            return result;
        } catch (Throwable ex) {
            success = false;
            throw ex;  // rethrow — don't swallow exceptions in @Around
        } finally {
            long elapsedMs = (System.nanoTime() - startNanos) / 1_000_000;

            // Record to Micrometer (exposed via /actuator/prometheus for Grafana)
            meterRegistry.timer("method.execution.time",
                "operation", operation,
                "success",   String.valueOf(success))
                .record(elapsedMs, TimeUnit.MILLISECONDS);

            if (elapsedMs > 500) {
                log.warn("[SLOW] {} took {}ms (threshold: 500ms)", operation, elapsedMs);
            } else {
                log.debug("[PERF] {} took {}ms", operation, elapsedMs);
            }
        }
    }
}

class OrderFulfillmentService$$SpringCGLIB extends OrderFulfillmentService {
    private final OrderFulfillmentService target;    // the real bean
    private final TransactionInterceptor txInterceptor;

    @Override
    public void fulfill(Long orderId) {

        TransactionStatus tx = txInterceptor.beginTransaction();
        try {
            target.fulfill(orderId);     // delegate to the REAL bean's method
            txInterceptor.commit(tx);    // 3. After returning: commit
        } catch (RuntimeException ex) {
            txInterceptor.rollback(tx);  // 4. After throwing: rollback
            throw ex;
        }
    }
    // Caller interacts with this proxy; the real OrderFulfillmentService is hidden inside
}

    public void auditSuccessfulOrder(JoinPoint joinPoint, Object result) {
        String method = joinPoint.getSignature().getName();
        log.info("[POST] {} succeeded, result: {}", method, result);

        // Persist audit trail for compliance
        if (result instanceof Order order) {
            auditLogRepository.save(AuditLog.builder()
                .action(method)
                .entityId(String.valueOf(order.getId()))
                .userId(SecurityContextHolder.getContext().getAuthentication().getName())
                .timestamp(Instant.now())
                .outcome("SUCCESS")
                .build());
        }
    }

    // ---- @AfterThrowing: runs when method throws; can log/re-throw ----
    @AfterThrowing(pointcut = "orderServiceMethods()", throwing = "exception")
    public void auditFailedOrder(JoinPoint joinPoint, Exception exception) {
        String method = joinPoint.getSignature().getName();
        log.error("[FAIL] {} threw {}: {}", method, exception.getClass().getSimpleName(), exception.getMessage());

        auditLogRepository.save(AuditLog.builder()
            .action(method)
            .userId(getCurrentUser())
            .timestamp(Instant.now())
            .outcome("FAILURE")
            .errorMessage(exception.getMessage())
            .build());
        // @AfterThrowing does NOT suppress exceptions — they still propagate to the caller
    }

    // ---- @After: runs always (success OR exception) — like finally block ----
    @After("auditableMethods()")
    public void releaseResources(JoinPoint joinPoint) {
        // Always runs — cleanup MDC, release thread-local state, etc.
        log.trace("[ALWAYS] {} completed (success or failure)", joinPoint.getSignature().getName());
    }

    // ---- @Around: most powerful — wraps entire method, can change args/return/exception ----
    @Around("@annotation(auditable)")  // "auditable" parameter bound from annotation
    public Object aroundAuditable(ProceedingJoinPoint joinPoint, Auditable auditable) throws Throwable {
        String action = auditable.action().isBlank()
                        ? joinPoint.getSignature().getName()
                        : auditable.action();
        log.info("[AUDIT] Starting: {}", action);
        try {
            Object result = joinPoint.proceed();  // call the real method
            log.info("[AUDIT] Completed: {}", action);
            return result;
        } catch (Throwable ex) {
            log.error("[AUDIT] Failed: {} — {}", action, ex.getMessage());
            throw ex;
        }
    }

    private String getCurrentUser() {
        Authentication auth = SecurityContextHolder.getContext().getAuthentication();
        return auth != null ? auth.getName() : "anonymous";
    }
}

            txManager.commit();

            // ---- metrics — not business logic ----
            meterRegistry.counter("orders.placed").increment();

            log.info("[END] placeOrder succeeded: orderId={}, took={}ms", order.getId(), elapsedMs);

            meterRegistry.counter("orders.failed",

            code: `-- ✅ Anomaly reference: what each isolation level prevents
-- Level              | Dirty Read | Non-Repeatable Read | Phantom Read

-- REPEATABLE READ    |     ✅     |         ✅          |  ✅ (PG MVCC) / ❌ (MySQL)

-- ✅ READ COMMITTED (default): each statement sees freshly committed data

  -- Another transaction commits a stock change here

-- ✅ REPEATABLE READ: snapshot taken at transaction start — reads are stable
-- Suitable for: checkout flow that reads then updates based on the same data

  SELECT stock FROM products WHERE id = 99;  -- snapshot: 10
  -- Another transaction commits stock = 8 here

  UPDATE products SET stock = stock - 2 WHERE id = 99 AND stock >= 2;

            code: `// ✅ State 1: TRANSIENT — new object, not known to any EntityManager

// ✅ State 2: PERSISTENT (Managed) — inside a transaction, tracked by EntityManager
@Transactional
public Order processOrder(Long orderId) {
    // findById: loads from DB → entity becomes PERSISTENT (tracked)
    Order order = orderRepository.findById(orderId).orElseThrow();

    // Dirty checking: Hibernate snapshots the state at load time
    order.setStatus(OrderStatus.PROCESSING);  // just a Java setter
    order.setUpdatedAt(LocalDateTime.now());

    // NO explicit save() needed — Hibernate detects the change via dirty check
    // At flush (end of transaction): issues UPDATE orders SET status='PROCESSING', updated_at=? WHERE id=?
    return order;
}  // ← Transaction commits here → flush → DB updated → session closes → entity becomes DETACHED

// ✅ State 3: DETACHED — session closed, changes NOT tracked
// This is the returned order object above — it's now detached
order.setStatus(OrderStatus.SHIPPED);  // DOES NOT update DB — no active EntityManager!

// ✅ Re-attaching: merge() copies detached state into a new managed entity
@Transactional
public Order reattachAndSave(Order detachedOrder) {
    Order managed = em.merge(detachedOrder);
    // merge() finds/loads the entity by ID and copies fields from detachedOrder into it
    // managed is the PERSISTENT version — detachedOrder remains detached
    return managed;
}

// ✅ State 4: REMOVED — scheduled for deletion
@Transactional
public void cancelOrder(Long orderId) {
    Order order = orderRepository.findById(orderId).orElseThrow();

    em.remove(order);  // or: orderRepository.delete(order);
    // On flush: DELETE FROM orders WHERE id = ?

    private String name;

    private Long version;  // starts at 0; Hibernate increments on every successful UPDATE

@Service
public class ProductService {

    @Transactional
    @Retryable(value = OptimisticLockException.class,
               maxAttempts = 3,
               backoff = @Backoff(delay = 50, multiplier = 2))
    public void decrementStock(Long productId, int qty) {
        Product p = productRepository.findById(productId).orElseThrow();
        if (p.getStock() < qty) throw new OutOfStockException();
        p.setStock(p.getStock() - qty);
        // At flush: UPDATE products SET stock=8, version=2 WHERE id=99 AND version=1

    }

// ✅ Pessimistic Locking — use when contention is HIGH (e.g., flash sale, ticket booking)
// SELECT FOR UPDATE: locks the row immediately; other transactions wait until we commit
@Service
public class TicketService {

    @Transactional
    public BookingResult bookTicket(Long eventId, Long userId) {
        // PESSIMISTIC_WRITE → SELECT * FROM events WHERE id=? FOR UPDATE
        Event event = eventRepository.findById(eventId, LockModeType.PESSIMISTIC_WRITE)
                                     .orElseThrow();
        if (event.getAvailableSeats() <= 0) {
            throw new SoldOutException("Event " + eventId + " is sold out");
        }
        event.setAvailableSeats(event.getAvailableSeats() - 1);  // safe — we hold the row lock
        Booking booking = new Booking(eventId, userId, LocalDateTime.now());
        bookingRepository.save(booking);
        return BookingResult.success(booking.getId());
    }  // ← COMMIT: lock released, next waiting transaction proceeds
}

            code: `// ✅ Redis use cases in Spring Boot e-commerce platform

@Service
public class RedisService {
    @Autowired
    private RedisTemplate<String, Object> redis;
    @Autowired
    private StringRedisTemplate stringRedis;

    // --- Use case 1: Cache product details (String / JSON) ---
    // Key pattern: "product:{id}" — TTL 10 minutes (product data changes infrequently)
    public Product getProduct(Long id) {
        String key = "product:" + id;
        Product cached = (Product) redis.opsForValue().get(key);
        if (cached != null) return cached;
        Product product = productRepository.findById(id).orElseThrow();
        redis.opsForValue().set(key, product, 10, TimeUnit.MINUTES);
        return product;
    }

    // --- Use case 2: Shopping cart (Hash — one key per user, fields per product) ---
    // HSET cart:user:42 product:99 2    → add 2 units of product 99
    // HGETALL cart:user:42              → get full cart
    public void addToCart(Long userId, Long productId, int qty) {
        String key = "cart:user:" + userId;
        redis.opsForHash().put(key, "product:" + productId, String.valueOf(qty));
        redis.expire(key, 7, TimeUnit.DAYS);  // cart expires after 7 days of inactivity
    }
    public Map<Object, Object> getCart(Long userId) {
        return redis.opsForHash().entries("cart:user:" + userId);
    }

    // --- Use case 3: Rate limiting (atomic INCR + EXPIRE) ---
    // Token bucket approximation: fixed window per second per client
    public boolean isRateLimitAllowed(String clientId, int maxPerSecond) {
        String key = "ratelimit:" + clientId + ":" + (System.currentTimeMillis() / 1000);
        Long count = stringRedis.opsForValue().increment(key);
        if (count == 1) stringRedis.expire(key, 2, TimeUnit.SECONDS);  // 2s safety margin
        return count <= maxPerSecond;  // false → return HTTP 429
    }

    // --- Use case 4: Distributed lock (SETNX + Expiry — simple version) ---
    // Production: use Redisson RLock for Redlock algorithm
    public boolean acquireLock(String resource, String requestId, long ttlMs) {
        // SET NX EX: set only if not exists + expiry in one atomic command
        Boolean acquired = stringRedis.opsForValue()
            .setIfAbsent("lock:" + resource, requestId, ttlMs, TimeUnit.MILLISECONDS);
        return Boolean.TRUE.equals(acquired);
    }
    public void releaseLock(String resource, String requestId) {
        // Only release if we own the lock (check requestId matches)
        String currentHolder = stringRedis.opsForValue().get("lock:" + resource);
        if (requestId.equals(currentHolder)) {
            stringRedis.delete("lock:" + resource);
        }
    }
}

// ✅ MongoDB Aggregation Pipeline: revenue report by product category
@Repository
public class OrderReportRepository {
    @Autowired
    private MongoTemplate mongo;

    public List<CategoryRevenue> getRevenueByCategory(int topN) {
        Aggregation pipeline = Aggregation.newAggregation(
            // Stage 1: filter completed orders in last 30 days
            Aggregation.match(Criteria.where("status").is("COMPLETED")
                                      .and("createdAt").gte(LocalDateTime.now().minusDays(30))),
            // Stage 2: unwind items array — one document per order item
            Aggregation.unwind("items"),
            // Stage 3: group by product category
            Aggregation.group("items.category")
                .sum("items.subtotal").as("revenue")
                .count().as("orderCount")
                .avg("items.subtotal").as("avgItemValue"),
            // Stage 4: sort descending by revenue
            Aggregation.sort(Sort.by(Sort.Direction.DESC, "revenue")),
            // Stage 5: take top N
            Aggregation.limit(topN),
            // Stage 6: project final shape
            Aggregation.project("revenue", "orderCount", "avgItemValue")
                       .and("_id").as("category")
        );
        return mongo.aggregate(pipeline, "orders", CategoryRevenue.class).getMappedResults();
    }

    // ✅ $lookup: MongoDB JOIN (equivalent to SQL LEFT JOIN)
    public List<OrderWithUser> getOrdersWithUsers() {
        Aggregation pipeline = Aggregation.newAggregation(
            Aggregation.lookup("users", "customerId", "_id", "userInfo"),  // JOIN users collection
            Aggregation.unwind("userInfo"),
            Aggregation.project("status", "total", "createdAt")
                       .and("userInfo.email").as("customerEmail")
        );
        return mongo.aggregate(pipeline, "orders", OrderWithUser.class).getMappedResults();
    }
}`,

// ✅ Global JWT filter: validate token before any route is reached
@Component
public class JwtAuthFilter implements GlobalFilter, Ordered {
    @Override
    public Mono<Void> filter(ServerWebExchange exchange, GatewayFilterChain chain) {
        String auth = exchange.getRequest().getHeaders().getFirst("Authorization");
        if (auth == null || !auth.startsWith("Bearer ")) {
            exchange.getResponse().setStatusCode(HttpStatus.UNAUTHORIZED);
            return exchange.getResponse().setComplete();
        }
        // Validate JWT, extract claims, forward userId in header to downstream
        Claims claims = jwtUtil.parse(auth.substring(7));
        ServerHttpRequest mutated = exchange.getRequest().mutate()
            .header("X-User-Id", claims.getSubject())
            .build();
        return chain.filter(exchange.mutate().request(mutated).build());
    }

    @Override public int getOrder() { return -1; }  // run before other filters
}`,

// ✅ Sliding Window counter (manual, no external dependency) — for simpler cases
@Component
public class SlidingWindowRateLimiter {
    private final Map<String, Deque<Long>> requestTimes = new ConcurrentHashMap<>();

    public boolean isAllowed(String userId, int maxRequests, long windowMs) {
        long now = System.currentTimeMillis();
        Deque<Long> times = requestTimes.computeIfAbsent(userId, k -> new ArrayDeque<>());
        synchronized (times) {
            while (!times.isEmpty() && times.peekFirst() < now - windowMs) times.pollFirst();
            if (times.size() >= maxRequests) return false;  // exceeded
            times.addLast(now);
            return true;
        }
    }
}`,

            code: `// ✅ Circuit Breaker state machine — visualized with comments
//
// ┌─────────────────────────────────────────────────────────────────────┐
// │  CLOSED (normal)     │  OPEN (tripped)      │  HALF_OPEN (probing) │
// │  All calls go through│  All calls fail fast │  Limited calls through│
// │  Monitors failure %  │  No downstream calls │  Tests if recovered  │
// └──────────┬───────────┴──────────┬───────────┴──────────┬───────────┘
//            │ failure rate         │ waitDuration          │ probe calls
//            │ > threshold          │ expires (30s)         │ succeed
//            └─────► OPEN ──────────┘          └────────────► CLOSED
//                                  └── probe calls fail ──► OPEN

@Configuration
public class CircuitBreakerConfig {
    @Bean
    public CircuitBreaker paymentCircuitBreaker(CircuitBreakerRegistry registry) {
        CircuitBreaker cb = registry.circuitBreaker("paymentService");

        // ── Observe and log all state transitions ──
        cb.getEventPublisher()
            .onStateTransition(event -> {
                CircuitBreakerTransition t = event.getStateTransition();
                log.warn("Circuit [{}]: {} → {}",
                    event.getCircuitBreakerName(),
                    t.getFromState(), t.getToState());
                // Alert on-call when circuit trips
                if (t.getToState() == CircuitBreaker.State.OPEN) {
                    alertService.sendAlert("CIRCUIT OPEN: paymentService is failing — fast-failing all requests");
                }
                if (t.getToState() == CircuitBreaker.State.CLOSED) {
                    alertService.sendInfo("CIRCUIT CLOSED: paymentService recovered");
                }
            })
            // Track how many calls were rejected while OPEN
            .onCallNotPermitted(event ->
                metricsRegistry.counter("circuit.rejected", "service", "paymentService").increment()
            )
            // Track slow calls (counted toward failure rate if > slow-call-duration-threshold)
            .onSlowCallRateExceeded(event ->
                log.warn("Payment service slow call rate exceeded: {}%", event.getSlowCallRate())
            );

        return cb;
    }
}

@RestController

        CircuitBreaker cb = registry.circuitBreaker(name);

        return Map.of(

            "failureRate",     m.getFailureRate() + "%",

        );

        registry.circuitBreaker(name).transitionToForcedOpenState();

    @PostMapping("/{name}/reset")

        registry.circuitBreaker(name).reset();   // back to CLOSED, metrics cleared
    }

    // Unary RPC: one request, one response
    @Override
    public void getOrder(GetOrderRequest req, StreamObserver<OrderResponse> observer) {

                .orElseThrow(() -> new OrderNotFoundException(req.getOrderId()));
            OrderResponse response = OrderResponse.newBuilder()
                .setId(order.getId())
                .setStatus(order.getStatus().name())
                .setTotal(order.getTotal().doubleValue())
                .build();
            observer.onNext(response);
            observer.onCompleted();
        } catch (OrderNotFoundException e) {
            observer.onError(Status.NOT_FOUND
                .withDescription("Order " + req.getOrderId() + " not found")
                .asRuntimeException());
        }
    }

    // Server-streaming RPC: one request, multiple responses (real-time order updates)
    @Override
    public void streamOrderUpdates(OrderId req, StreamObserver<OrderEvent> observer) {
        orderEventBus.subscribe(req.getId(), event -> {
            observer.onNext(OrderEvent.newBuilder()
                .setOrderId(event.getOrderId())
                .setEventType(event.getType().name())
                .setTimestamp(event.getTimestamp().toString())

        });

}

@Configuration
public class FeignPaymentConfig {

    // Timeout: connect 2s, read 5s — CRITICAL: no timeout = threads held indefinitely
    @Bean
    public Request.Options options() {
        return new Request.Options(2, TimeUnit.SECONDS, 5, TimeUnit.SECONDS, true);
    }

    // Custom error decoder: convert Feign HTTP errors to domain exceptions
    @Bean
    public ErrorDecoder errorDecoder() {
        return (methodKey, response) -> switch (response.status()) {
            case 400 -> new InvalidPaymentRequestException("Bad payment request");
            case 404 -> new PaymentNotFoundException("Payment not found");
            case 503 -> new RetryableException(503, "Payment service unavailable",

            default  -> new FeignException.InternalServerError(methodKey, null, null, null);
        };
    }

    // Log request/response in dev for debugging (FULL: headers + body)
    @Bean
    public feign.Logger.Level feignLogLevel() {

// Problem: placing an order spans 3 services (Inventory, Payment, Shipping)
// No single DB transaction across services → use Saga: chain of local transactions + compensation

// ─── Happy path flow (Choreography via Kafka events) ───
// 1. OrderService:    CREATE order → publish "order.created"
// 2. InventoryService: reserve stock → publish "stock.reserved"  (or "stock.failed")
// 3. PaymentService:  charge card   → publish "payment.completed" (or "payment.failed")
// 4. ShippingService: schedule ship → publish "shipping.scheduled"
// 5. OrderService:    update status → COMPLETED

// ─── Compensation flow (if payment fails) ───
// 3. PaymentService:  publish "payment.failed"
// 2. InventoryService: listens to "payment.failed" → release reservation (compensating tx)
// 1. OrderService:    listens to "payment.failed" or "stock.failed" → cancel order

// ✅ OrderService: initiate saga
@Service
public class OrderSagaInitiator {
    @Autowired KafkaTemplate<String, Object> kafka;

    @Transactional
    public Order placeOrder(PlaceOrderRequest request) {
        // Local transaction: persist order in PENDING state
        Order order = new Order(request.getCustomerId(), request.getItems(), OrderStatus.PENDING);
        Order saved = orderRepository.save(order);

        // Publish saga start event — Outbox pattern recommended for reliability
        kafka.send("order.created", String.valueOf(saved.getId()),
            new OrderCreatedEvent(saved.getId(), saved.getCustomerId(),
                                  saved.getItems(), saved.getTotal()));
        return saved;
    }

    // Compensation: listen for failure events and cancel the order
    @KafkaListener(topics = {"stock.reservation.failed", "payment.failed"}, groupId = "order-service")
    @Transactional
    public void onSagaFailure(SagaFailureEvent event) {
        log.warn("Saga failed for orderId={}, reason={}", event.getOrderId(), event.getReason());
        orderRepository.updateStatus(event.getOrderId(), OrderStatus.CANCELLED);
        kafka.send("order.cancelled",
            new OrderCancelledEvent(event.getOrderId(), event.getReason()));
    }
}

    @Transactional
    public void onPaymentFailed(PaymentFailedEvent event) {
        reservationService.releaseReservation(event.getOrderId());
        log.info("Released stock reservation for orderId={}", event.getOrderId());
    }

// Each service reacts to events and publishes new events — decoupled, but harder to trace

// ── Full event flow for "Place Order" saga ──
// Forward path:
//  order-service  ──[order.created]──► inventory-service
//  inventory-service ──[stock.reserved]──► payment-service

//                                    ──► order-service      (cancel order)

// ✅ PaymentService: reacts to stock.reserved, publishes payment result
@Service
public class PaymentChoreographyHandler {
    @Autowired KafkaTemplate<String, Object> kafka;
    @Autowired PaymentGateway paymentGateway;

    @KafkaListener(topics = "stock.reserved", groupId = "payment-service")
    @Transactional
    public void onStockReserved(StockReservedEvent event, Acknowledgment ack) {
        try {
            // Idempotency check: avoid double-charge if message delivered twice
            if (paymentRepository.existsByOrderId(event.getOrderId())) {
                log.warn("Duplicate payment event for orderId={}, skipping", event.getOrderId());
                ack.acknowledge();
                return;
            }
            // Local transaction: charge + save payment record
            PaymentResult result = paymentGateway.charge(
                event.getCustomerId(), event.getTotal(), event.getOrderId()
            );
            paymentRepository.save(new Payment(event.getOrderId(), result.getTransactionId(), PaymentStatus.COMPLETED));

            // Forward: trigger shipping
            kafka.send("payment.completed",
                new PaymentCompletedEvent(event.getOrderId(), result.getTransactionId()));
            ack.acknowledge();  // commit Kafka offset only after local tx + publish succeed
        } catch (PaymentDeclinedException e) {
            kafka.send("payment.failed",
                new PaymentFailedEvent(event.getOrderId(), "Card declined: " + e.getMessage()));
            ack.acknowledge();
        }
    }
}

@WorkflowInterface
public interface OrderFulfillmentWorkflow {
    @WorkflowMethod
    OrderResult processOrder(OrderRequest request);

    @SignalMethod
    void cancelOrder(String reason);  // signal from external system to abort
}

@WorkflowImpl
public class OrderFulfillmentWorkflowImpl implements OrderFulfillmentWorkflow {

    // Each activity stub has independent timeout + retry config
    private final InventoryActivity inventory = Workflow.newActivityStub(
        InventoryActivity.class,
        ActivityOptions.newBuilder()
            .setStartToCloseTimeout(Duration.ofSeconds(10))
            .setRetryOptions(RetryOptions.newBuilder()
                .setMaximumAttempts(3)
                .setDoNotRetry(OutOfStockException.class.getName())  // no retry for business error
                .build())
            .build());

    private final PaymentActivity payment = Workflow.newActivityStub(
        PaymentActivity.class,
        ActivityOptions.newBuilder()
            .setStartToCloseTimeout(Duration.ofSeconds(30))
            .setRetryOptions(RetryOptions.newBuilder().setMaximumAttempts(2).build())
            .build());

    private volatile boolean cancelled = false;

    @Override
    public OrderResult processOrder(OrderRequest req) {
        String reservationId = null;
        String transactionId  = null;
        try {
            // Step 1: Reserve stock — Temporal auto-retries transient failures
            reservationId = inventory.reserve(req.getOrderId(), req.getItems());

            if (cancelled) {
                inventory.release(reservationId);   // compensate before abort
                return OrderResult.cancelled(req.getOrderId());
            }

            // Step 2: Charge customer — if this fails, compensate Step 1
            transactionId = payment.charge(req.getCustomerId(), req.getTotal(), req.getOrderId());

            // Step 3: Schedule shipping
            ShippingActivity shipping = Workflow.newActivityStub(ShippingActivity.class,
                ActivityOptions.newBuilder().setStartToCloseTimeout(Duration.ofMinutes(5)).build());
            String tracking = shipping.schedule(req.getOrderId(), req.getShippingAddress());

            return OrderResult.success(req.getOrderId(), transactionId, tracking);

        } catch (OutOfStockException e) {
            return OrderResult.failed(req.getOrderId(), "Out of stock: " + e.getMessage());
        } catch (PaymentDeclinedException e) {
            if (reservationId != null) inventory.release(reservationId);  // compensate Step 1
            return OrderResult.failed(req.getOrderId(), "Payment declined");
        } catch (Exception e) {
            if (transactionId != null) payment.refund(transactionId, req.getTotal());  // comp Step 2
            if (reservationId != null) inventory.release(reservationId);              // comp Step 1
            throw ApplicationFailure.newFailure("Order failed", "OrderError", e);
        }
    }

    @Override
    public void cancelOrder(String reason) { this.cancelled = true; }

@Configuration
public class RabbitMQConfig {

    // Main exchange: topic type → flexible routing by event type
    @Bean
    public TopicExchange orderExchange() {
        return ExchangeBuilder.topicExchange("order.exchange").durable(true).build();
    }

    // Dead-letter exchange: receives rejected/expired messages
    @Bean
    public DirectExchange deadLetterExchange() {
        return ExchangeBuilder.directExchange("order.dlx").durable(true).build();
    }

    // Main queue: bound to DLX so failed messages auto-route to DLQ
    @Bean
    public Queue orderQueue() {
        return QueueBuilder.durable("order.queue")
            .withArgument("x-dead-letter-exchange", "order.dlx")
            .withArgument("x-dead-letter-routing-key", "order.dead")
            .withArgument("x-message-ttl", 30_000)   // 30s TTL before → DLQ
            .build();
    }

    // DLQ: stores failed messages for investigation and replay
    @Bean
    public Queue deadLetterQueue() {
        return QueueBuilder.durable("order.dlq").build();
    }

    @Bean public Binding orderBinding() {
        return BindingBuilder.bind(orderQueue()).to(orderExchange()).with("order.#");
    }
    @Bean public Binding dlqBinding() {
        return BindingBuilder.bind(deadLetterQueue()).to(deadLetterExchange()).with("order.dead");
    }
}

@KafkaListener(topics = "payment-events", groupId = "order-service")
@Transactional
public void processPaymentEvent(PaymentProcessedEvent event, Acknowledgment ack) {
    // Idempotency key = unique event ID (UUID assigned by publisher)
    String dedupKey = "dedup:payment:" + event.getEventId();

    // SETNX (SET if Not eXists): atomic check-and-set with 24h TTL
    Boolean isNew = redisTemplate.opsForValue()
        .setIfAbsent(dedupKey, "processed", Duration.ofHours(24));

    if (Boolean.FALSE.equals(isNew)) {
        log.info("Duplicate payment event skipped: eventId={}", event.getEventId());
        ack.acknowledge(); // ack to prevent redelivery, but skip processing
        return;
    }

    // Process only if new
    orderService.markOrderPaid(event.getOrderId(), event.getAmount());
    paymentRepo.save(PaymentRecord.from(event));
    ack.acknowledge();
}

// If payment-events is replayed, the INSERT is a no-op — no duplicate payment record
// INSERT INTO payments (id, order_id, amount, status, created_at)
// VALUES (:eventId, :orderId, :amount, 'COMPLETED', NOW())
// ON CONFLICT (id) DO NOTHING;

// Outbox pattern: publish event atomically with DB write (prevents duplicate publish)
@Transactional
public void placeOrder(PlaceOrderCommand cmd) {
    Order order = orderRepo.save(new Order(cmd));
    // Save to outbox IN SAME TRANSACTION — if publish fails later, outbox retries
    outboxRepo.save(new OutboxMessage("order-events", order.getId(),
        new OrderCreatedEvent(order)));
    // Separate outbox poller reads and publishes — exactly-once publish guarantee
}

@Bean
public DefaultErrorHandler errorHandler(KafkaTemplate<?, ?> kafkaTemplate) {

    DeadLetterPublishingRecoverer recoverer = new DeadLetterPublishingRecoverer(kafkaTemplate,

    backoff.setMultiplier(2.0);

    DefaultErrorHandler handler = new DefaultErrorHandler(recoverer, backoff);

    // Non-retryable: fix required, retrying won't help
    handler.addNotRetryableExceptions(
        DeserializationException.class,   // bad message format
        ValidationException.class,         // business rule violation
        DataIntegrityViolationException.class // DB constraint (duplicate key)

            code: `// Consistent hashing: minimize key remap when nodes added/removed
// Problem: hash(key) % N → adding 1 node remaps ~N/(N+1) keys (cache stampede!)
// Solution: consistent hashing remaps only ~K/N keys on average

// Java: TreeMap as consistent hash ring
public class ConsistentHashRouter {
    private final TreeMap<Integer, String> ring = new TreeMap<>();
    private static final int VNODES_PER_NODE = 150; // virtual nodes for even distribution

    public void addNode(String nodeId) {
        for (int i = 0; i < VNODES_PER_NODE; i++) {
            int hash = hash(nodeId + "-vnode-" + i);
            ring.put(hash, nodeId); // each physical node has 150 positions on ring
        }
    }

    public void removeNode(String nodeId) {
        for (int i = 0; i < VNODES_PER_NODE; i++) {
            ring.remove(hash(nodeId + "-vnode-" + i));
        }
    }

    // Route request to node: find next clockwise position from key's hash
    public String getNode(String key) {
        if (ring.isEmpty()) throw new IllegalStateException("No nodes available");
        int hash = hash(key);
        Map.Entry<Integer, String> entry = ring.ceilingEntry(hash);
        return (entry != null ? entry : ring.firstEntry()).getValue(); // wrap around
    }

    private int hash(String key) {
        // Use MurmurHash or MD5 for better distribution than Java hashCode()
        return Math.abs(key.hashCode()) % Integer.MAX_VALUE;
    }
}

@Service @RequiredArgsConstructor
public class OrderService {
    private final OrderRepository orderRepo;
    private final RedisTemplate<String, Order> redis;

    // Read: check cache → miss → load from DB → populate cache
    public Order getOrder(String orderId) {
        String key = "order:" + orderId;

        Order cached = redis.opsForValue().get(key);
        if (cached != null) {
            log.debug("Cache HIT: orderId={}", orderId);
            return cached; // ~1ms from Redis
        }

        log.debug("Cache MISS: orderId={}", orderId);
        Order order = orderRepo.findById(orderId)
            .orElseThrow(() -> new OrderNotFoundException(orderId)); // ~20ms from DB
        redis.opsForValue().set(key, order, Duration.ofMinutes(30));
        return order;
    }

    // Write: update DB → invalidate cache (not update — avoids race condition)
    @Transactional
    public Order updateOrder(String orderId, UpdateOrderRequest req) {
        Order order = orderRepo.findById(orderId).orElseThrow();
        order.applyUpdate(req);
        Order saved = orderRepo.save(order);
        redis.delete("order:" + orderId); // evict stale entry; next read re-populates
        return saved;
    }
}

// Thundering herd prevention: only ONE request populates cache on miss
@Service @RequiredArgsConstructor
public class ProductService {
    private final RedisTemplate<String, Product> redis;
    private final ProductRepository repo;
    private final RedissonClient redisson;

    public Product getProduct(Long productId) {
        String cacheKey = "product:" + productId;
        Product cached = redis.opsForValue().get(cacheKey);
        if (cached != null) return cached;

        // Distributed lock: only one request hits DB; others wait and get cached result
        RLock lock = redisson.getLock("lock:product:" + productId);
        lock.lock(3, TimeUnit.SECONDS);
        try {
            // Double-check: another thread may have populated cache while we waited
            cached = redis.opsForValue().get(cacheKey);
            if (cached != null) return cached;

            Product product = repo.findById(productId).orElseThrow();
            redis.opsForValue().set(cacheKey, product, Duration.ofMinutes(30));
            return product;
        } finally {
            lock.unlock();
        }
    }
}`,

            @Override

                // readOnly tx → replica; write tx → primary

        routing.setDefaultTargetDataSource(primary);
        routing.afterPropertiesSet();

    }

@Component

    private final List<DataSource> shards; // shard-0, shard-1, shard-2, shard-3

    public ShardRouter(List<DataSource> shards) {

// Use case: inventory decrement, scheduled job dedup, double-booking prevention

// Redisson RLock: implements Redlock algorithm with lease renewal (watchdog)
@Service @RequiredArgsConstructor
public class InventoryService {
    private final RedissonClient redisson;
    private final InventoryRepository inventoryRepo;

    public boolean reserveStock(String productId, int qty) {
        // Lock key scoped to product — allows concurrent locks on DIFFERENT products
        RLock lock = redisson.getLock("lock:inventory:" + productId);

        // tryLock(waitTime=5s, leaseTime=10s)
        // waitTime: how long to wait if lock is held by another instance
        // leaseTime: auto-release after 10s (prevents deadlock if holder crashes)
        // Redisson watchdog: auto-renews lease every 10s/3 while lock is held
        try {
            if (!lock.tryLock(5, 10, TimeUnit.SECONDS)) {
                log.warn("Could not acquire inventory lock: productId={}", productId);
                return false; // caller can retry
            }
            try {
                int available = inventoryRepo.getAvailableQty(productId);
                if (available < qty) {
                    throw new InsufficientStockException(productId, qty, available);
                }
                inventoryRepo.decrement(productId, qty);
                log.info("Reserved {} units of {}", qty, productId);
                return true;
            } finally {
                if (lock.isHeldByCurrentThread()) {
                    lock.unlock(); // always release in inner finally
                }
            }
        } catch (InterruptedException e) {
            Thread.currentThread().interrupt();
            return false;
        }
    }
}

    try {
        orderService.cancelExpiredOrders();
    } finally {
        if (lock.isHeldByCurrentThread()) lock.unlock();

            code: `// Raw Redis lock with Lua (atomic acquire + release)
// Lua scripts execute atomically on Redis — no race between commands
@Service @RequiredArgsConstructor
public class RedisDistributedLock {
    private final RedisTemplate<String, String> redis;

    private static final String ACQUIRE_SCRIPT =
        "if redis.call('SET', KEYS[1], ARGV[1], 'NX', 'EX', ARGV[2]) then " +
        "  return 1 " +
        "else " +
        "  return 0 " +
        "end";

    private static final String RELEASE_SCRIPT =
        "if redis.call('GET', KEYS[1]) == ARGV[1] then " +  // only release if we own it
        "  return redis.call('DEL', KEYS[1]) " +
        "else " +
        "  return 0 " +
        "end";

    public String tryAcquire(String resource, int ttlSeconds) {
        String lockId = UUID.randomUUID().toString(); // unique per lock attempt
        Long result = redis.execute(
            new DefaultRedisScript<>(ACQUIRE_SCRIPT, Long.class),
            List.of("lock:" + resource),  // KEYS[1]
            lockId,                        // ARGV[1] = lock owner ID
            String.valueOf(ttlSeconds)     // ARGV[2] = TTL
        );
        return (result != null && result == 1L) ? lockId : null; // null = lock not acquired
    }

    public boolean release(String resource, String lockId) {
        Long result = redis.execute(
            new DefaultRedisScript<>(RELEASE_SCRIPT, Long.class),
            List.of("lock:" + resource),
            lockId  // must match — prevents releasing another holder's lock
        );
        return result != null && result == 1L;
    }
}

// Usage
public void processPayment(String orderId, BigDecimal amount) {
    String lockId = redisLock.tryAcquire("payment:" + orderId, 30); // 30s TTL

    try {
        paymentService.charge(orderId, amount);
    } finally {
        redisLock.release("payment:" + orderId, lockId); // Lua ensures atomic check+delete
    }
}

            code: `// Token Bucket rate limiting with Bucket4j (in-process)
@Service @RequiredArgsConstructor
public class RateLimiterService {
    // ConcurrentHashMap: one bucket per user (in-memory — use Redis for distributed)
    private final Map<String, Bucket> buckets = new ConcurrentHashMap<>();

    // Create bucket: 100 req/min with burst up to 200
    private Bucket createBucket() {
        return Bucket.builder()
            .addLimit(Bandwidth.builder()
                .capacity(200)                           // max burst size
                .refillGreedy(100, Duration.ofMinutes(1)) // refill 100 tokens/min
                .build())
            .build();
    }

    public boolean tryConsume(String userId) {
        Bucket bucket = buckets.computeIfAbsent(userId, k -> createBucket());
        return bucket.tryConsume(1); // consume 1 token; false if bucket empty
    }
}

// Rate limiting filter applied to all API endpoints
@Component @RequiredArgsConstructor
public class RateLimitFilter extends OncePerRequestFilter {
    private final RateLimiterService rateLimiter;

    @Override
    protected void doFilterInternal(HttpServletRequest req,
            HttpServletResponse resp, FilterChain chain)
            throws ServletException, IOException {
        String userId = req.getHeader("X-User-Id");
        if (userId != null && !rateLimiter.tryConsume(userId)) {
            resp.setStatus(HttpStatus.TOO_MANY_REQUESTS.value()); // 429
            resp.setHeader("Retry-After", "60");
            resp.setHeader("X-RateLimit-Limit", "100");
            resp.getWriter().write("{\"error\":\"Rate limit exceeded\"}");
            return;
        }
        chain.doFilter(req, resp);
    }
}

            code: `// Token Bucket: allows burst then throttles to steady rate
// Bucket capacity=100: can burst 100 requests instantly (tokens accumulated)
// Refill rate=10/sec: after burst, sustained rate is 10 req/sec

// Implementation with Redis (distributed, works across all instances)
@Service @RequiredArgsConstructor
public class RedisTokenBucketLimiter {
    private final RedisTemplate<String, String> redis;
    private static final int CAPACITY    = 100;  // max burst
    private static final int REFILL_RATE = 10;   // tokens per second

    // Atomic Lua script: refill + consume in one Redis round-trip
    private static final String TOKEN_BUCKET_SCRIPT =
        "local key = KEYS[1] " +
        "local capacity = tonumber(ARGV[1]) " +
        "local refillRate = tonumber(ARGV[2]) " +
        "local now = tonumber(ARGV[3]) " +
        "local data = redis.call('HMGET', key, 'tokens', 'lastRefill') " +
        "local tokens = tonumber(data[1]) or capacity " +
        "local lastRefill = tonumber(data[2]) or now " +
        "local elapsed = (now - lastRefill) / 1000.0 " +
        "tokens = math.min(capacity, tokens + elapsed * refillRate) " +
        "if tokens >= 1 then " +
        "  tokens = tokens - 1 " +
        "  redis.call('HMSET', key, 'tokens', tokens, 'lastRefill', now) " +
        "  redis.call('EXPIRE', key, 3600) " +
        "  return 1 " +
        "else " +
        "  return 0 " +
        "end";

    public boolean tryAcquire(String clientId) {
        long now = System.currentTimeMillis();
        Long result = redis.execute(
            new DefaultRedisScript<>(TOKEN_BUCKET_SCRIPT, Long.class),
            List.of("rate:bucket:" + clientId),
            String.valueOf(CAPACITY),
            String.valueOf(REFILL_RATE),
            String.valueOf(now)
        );
        return Long.valueOf(1L).equals(result);
    }
}

            code: `// Sliding Window Log: exact count in rolling time window using Redis sorted set
// Each request = one entry in sorted set (score = timestamp)
// Window = remove entries older than now-windowMs, then count remaining

@Service @RequiredArgsConstructor
public class SlidingWindowRateLimiter {
    private final RedisTemplate<String, String> redis;
    private static final long WINDOW_MS  = 60_000L; // 1-minute sliding window
    private static final int  LIMIT      = 100;      // max 100 requests per window

    public boolean isAllowed(String clientId) {
        long now        = System.currentTimeMillis();
        long windowStart = now - WINDOW_MS;
        String key      = "ratelimit:sw:" + clientId;

        // Pipeline: remove old → add current → count → set expiry (atomic-ish)
        List<Object> results = redis.executePipelined((RedisCallback<Object>) conn -> {
            byte[] keyBytes = key.getBytes();
            conn.zRemRangeByScore(keyBytes, 0, windowStart - 1); // remove entries before window
            conn.zAdd(keyBytes, now, (now + "-" + ThreadLocalRandom.current().nextInt()).getBytes());
            conn.zCard(keyBytes);
            conn.expire(keyBytes, 120); // expire key 2x window size (cleanup)
            return null;
        });

        Long count = (Long) results.get(2);
        boolean allowed = count != null && count <= LIMIT;
        if (!allowed) {
            log.warn("Rate limit exceeded: clientId={} count={} limit={}", clientId, count, LIMIT);
        }
        return allowed;
    }
}

// Fixed Window problem (why sliding window is better):
// Limit: 100 req/min using fixed window
// 00:59 → send 100 requests (fills window 1)
// 01:00 → window resets → send 100 more requests
// Result: 200 requests in 2 seconds! (double the rate at boundary)
// Sliding window counts in [now-60s, now] → prevents this spike

// Sliding Window Counter (memory-efficient approximation):
// Combine two fixed windows with weighted average
// current_count + previous_count * (remaining_time_in_current_window / window_size)
// Memory: O(1) per user vs O(requests) for sliding window log

// When to use which:
// Sliding Window Log: strict accuracy required (financial API, OAuth token endpoint)
// Sliding Window Counter: high-traffic APIs where ~5% error in rate is acceptable
// Fixed Window: simple counters, analytics (where boundary spike is acceptable)`,

            code: `// CAP Theorem: during network partition, choose Consistency OR Availability
// In practice: partition WILL happen → design for C or A, not both

// CP System (ZooKeeper, etcd): consistency over availability
// During partition: minority partition REJECTS writes → returns error
// Use case: distributed lock, leader election, config management
// → Correctness critical; brief unavailability acceptable

// AP System (Cassandra, DynamoDB): availability over consistency
// During partition: BOTH sides accept writes → stale/conflicting reads possible
// After partition heals: conflict resolution (last-write-wins, CRDTs)
// Use case: shopping cart, social media feed, user profile

// Cassandra: tune C vs A PER OPERATION using ConsistencyLevel
// ONE:    fastest, AP-like — 1 replica responds (may be stale)
// QUORUM: balanced — majority (N/2+1) replicas agree
// ALL:    CP-like — all replicas must respond (highest latency, lowest availability)

// user session:                    AP → stale session data fine
// distributed lock (order dedup):  CP → must be correct to prevent double-charge

// PostgreSQL + streaming replication: CP → replica may lag, primary is source of truth

// 1. STRONG CONSISTENCY: PostgreSQL single node — default ACID behavior
@Transactional(isolation = Isolation.READ_COMMITTED)  // default
public OrderSummary getOrderSummary(String orderId) {
    // Always reads the latest committed data — no stale reads within this DB
    return orderRepo.findById(orderId).map(OrderSummary::from).orElseThrow();
}

// 2. EVENTUAL CONSISTENCY: read replica (async replication lag 10ms-1s)
@Transactional(readOnly = true) // → routed to read replica
public List<OrderSummary> getRecentOrders(String userId) {
    // May return orders placed 200ms ago but not yet replicated
    // Acceptable for: dashboard, history, analytics
    return orderRepo.findByUserIdOrderByCreatedAtDesc(userId, PAGE_LAST_10);
}

// 3. READ-YOUR-WRITES: user must see their own changes immediately
@Transactional
public Order placeOrder(PlaceOrderCommand cmd) {
    Order order = orderRepo.save(new Order(cmd)); // write to primary
    // Return immediately from SAME TRANSACTION on primary → read-your-writes guaranteed
    // Do NOT redirect to replica immediately after (replication lag would break this)
    return order;
}

// 4. MONOTONIC READS: prevent "going back in time" across multiple reads
// Problem: user reads order (version 5) from replica-A, then reads same order
// from replica-B which is lagging → sees version 4!
// Solution: session affinity to same replica, OR route user to primary for X seconds after write

// 5. SESSION CONSISTENCY: combine read-your-writes + monotonic reads
// Implementation: track last-write timestamp in user session
// If request has write within last 5 seconds → route to primary
@GetMapping("/orders/{orderId}")
public Order getOrder(@PathVariable String orderId, HttpSession session) {
    Instant lastWrite = (Instant) session.getAttribute("lastOrderWrite");
    boolean recentWrite = lastWrite != null &&
        Duration.between(lastWrite, Instant.now()).getSeconds() < 5;
    // recentWrite → query primary; otherwise → replica (via @Transactional(readOnly=true))
    return recentWrite ? orderQueryService.fromPrimary(orderId)
                       : orderQueryService.fromReplica(orderId);
}`,

// 1. PostgreSQL: strong consistency by default (single-node ACID)
@Service @RequiredArgsConstructor
public class PaymentService {

    // SERIALIZABLE: strongest isolation — no phantom reads, no concurrent anomalies
    // Use for: financial transfer, inventory update
    @Transactional(isolation = Isolation.SERIALIZABLE)
    public PaymentResult processPayment(String orderId, BigDecimal amount) {
        // Reads within this tx always see the latest committed data
        Account account = accountRepo.findByOrderId(orderId);
        if (account.getBalance().compareTo(amount) < 0) {
            throw new InsufficientFundsException(orderId, amount, account.getBalance());
        }
        account.debit(amount);
        accountRepo.save(account);
        return PaymentResult.success(orderId, amount);
    }

    // READ_COMMITTED (default): balance may update between reads within same tx
    // REPEATABLE_READ: same row returns same value within tx
    // SERIALIZABLE: no concurrent anomalies — behaves like sequential execution
}

// 2. Distributed strong consistency: PostgreSQL synchronous replication
// postgresql.conf: synchronous_commit = on  (default)

// synchronous_standby_names = 'replica-1'  → named standby must confirm
// Cost: write latency += replication round-trip (~1-5ms same datacenter)

// 3. Global strong consistency: Google Spanner / CockroachDB
// Uses TrueTime API (Spanner) or Hybrid Logical Clocks (CockroachDB)
// to assign globally monotonic timestamps across datacenters
// Reads at timestamp T guaranteed to see all commits before T globally

// 4. Application-level strong consistency with Redis distributed lock
@Transactional

    RLock lock = redisson.getLock("lock:inventory:" + productId);
    lock.lock(10, TimeUnit.SECONDS); // exclusive lock → no concurrent decrement

        int available = inventoryRepo.getAvailableQty(productId);  // fresh read under lock
        if (available < qty) return false;
        inventoryRepo.decrement(productId, qty);

    }

RUN mvn dependency:go-offline -q       # pre-download all deps into ~/.m2

COPY src ./src
# -DskipTests: tests run as a separate CI step, not inside Docker build
RUN mvn package -DskipTests -q

# Stage 2: RUNTIME — Alpine JRE only (~120 MB); minimal attack surface
FROM eclipse-temurin:21.0.3_9-jre-alpine AS runtime
WORKDIR /app

# Security: never run as root in production containers
RUN apk add --no-cache curl \
 && addgroup -S appgroup \
 && adduser  -S appuser -G appgroup

USER appuser

# Only the fat-jar from the build stage — no source, no Maven cache
COPY --from=build --chown=appuser:appgroup /app/target/order-service-*.jar app.jar

# HEALTHCHECK mirrors K8s liveness probe; both target Spring Actuator
HEALTHCHECK --interval=30s --timeout=5s --retries=3 \
  CMD curl -sf http://localhost:8080/actuator/health/liveness || exit 1

EXPOSE 8080

# -XX:+UseContainerSupport  → JVM reads cgroup memory limit, not host RAM
# -XX:MaxRAMPercentage=75   → leaves 25 % headroom for OS + off-heap memory
ENTRYPOINT ["java", \
  "-XX:+UseContainerSupport", \
  "-XX:MaxRAMPercentage=75.0", \
  "-Djava.security.egd=file:/dev/./urandom", \
  "-jar", "app.jar"]`,

// ── MDC Filter: inject correlation IDs into every request ───────────────────
@Component @Order(1)
public class MdcLoggingFilter extends OncePerRequestFilter {
    @Override
    protected void doFilterInternal(HttpServletRequest req,
                                    HttpServletResponse res,
                                    FilterChain chain) throws IOException, ServletException {
        // Propagate trace ID from upstream (e.g. API Gateway, Zipkin)
        String traceId = Optional.ofNullable(req.getHeader("X-B3-TraceId"))
                                 .orElse(UUID.randomUUID().toString().replace("-",""));
        MDC.put("traceId",   traceId);
        MDC.put("spanId",    UUID.randomUUID().toString().substring(0,16));
        MDC.put("requestId", UUID.randomUUID().toString());
        MDC.put("userId",    extractUserId(req));   // from JWT claim
        MDC.put("path",      req.getRequestURI());
        res.setHeader("X-Trace-Id", traceId);      // return to client for debugging
        try {
            chain.doFilter(req, res);
        } finally {
            MDC.clear();  // IMPORTANT: clear to avoid thread pool contamination
        }
    }
}

@Service @Slf4j
public class OrderService {
    public Order placeOrder(OrderRequest req) {
        MDC.put("orderId", req.getOrderId());  // add order-specific context
        log.info("Placing order for user={} items={}", req.getUserId(), req.getItemCount());
        try {
            Order order = processOrder(req);
            // JSON output: {"@timestamp":"...","level":"INFO","traceId":"abc123",
            //   "requestId":"def456","userId":"u1","orderId":"o99","message":"Order placed"}
            log.info("Order placed successfully status={} total={}", order.getStatus(), order.getTotal());
            return order;
        } catch (PaymentDeclinedException e) {
            log.warn("Payment declined reason={} amount={}", e.getReason(), req.getTotal());
            throw e;
        } catch (Exception e) {
            log.error("Unexpected error placing order", e);  // stack trace included in JSON
            throw e;
        } finally {
            MDC.remove("orderId");
        }
    }
}`,

            code: `@ExtendWith(MockitoExtension.class)
@DisplayName("Parameterized Test Examples")
class OrderParameterizedTest {

    @InjectMocks OrderService service;
    @Mock OrderRepository repo;

    // ── @CsvSource: simple tabular input/expected pairs ──────────────────────
    @ParameterizedTest(name = "discount type={0} price={1} → expected={2}")
    @CsvSource({
        "REGULAR,  100.00, 100.00",   // no discount
        "MEMBER,   100.00,  90.00",   // 10% off
        "VIP,      100.00,  80.00",   // 20% off
        "STUDENT,   50.00,  37.50",   // 25% off
    })
    void applyDiscount_variousTypes_correctPrice(String type, BigDecimal price, BigDecimal expected) {
        BigDecimal result = service.applyDiscount(CustomerType.valueOf(type), price);
        assertThat(result).isEqualByComparingTo(expected);
    }

    // ── @MethodSource: complex objects / multiple args ────────────────────────
    @ParameterizedTest(name = "invalid order: {1}")
    @MethodSource("invalidOrderRequests")
    void placeOrder_invalidRequest_throwsValidationException(OrderRequest req, String reason) {
        assertThrows(ValidationException.class,
            () -> service.placeOrder(req),
            "Expected validation failure for: " + reason);
    }

    static Stream<Arguments> invalidOrderRequests() {
        return Stream.of(
            Arguments.of(new OrderRequest(null, validItems()),            "null userId"),
            Arguments.of(new OrderRequest("",   validItems()),            "blank userId"),
            Arguments.of(new OrderRequest("u1", List.of()),               "empty items"),
            Arguments.of(new OrderRequest("u1", null),                    "null items"),
            Arguments.of(new OrderRequest("u1", itemsExceedingLimit()),   "too many items (>100)")
        );
    }

    // ── @EnumSource: test all or filtered enum values ─────────────────────────
    @ParameterizedTest(name = "terminal status {0} cannot be cancelled")
    @EnumSource(value = OrderStatus.class,
                names  = {"CANCELLED", "DELIVERED", "REFUNDED"})  // only these
    void cancelOrder_terminalStatus_throwsInvalidStateException(OrderStatus status) {
        Order order = new Order("u1", validItems());
        order.setStatus(status);
        when(repo.findById(any())).thenReturn(Optional.of(order));
        assertThrows(InvalidStateException.class, () -> service.cancelOrder(order.getId()));
    }

    // ── @ValueSource: simple single-value parameterization ───────────────────
    @ParameterizedTest(name = "blank userId={0} rejected")
    @ValueSource(strings = { " ", "  ", "\t", "\n" })
    void placeOrder_blankUserId_throwsValidation(String blankId) {
        assertThrows(ValidationException.class,
            () -> service.placeOrder(new OrderRequest(blankId, validItems())));
    }

    // ── helpers ──────────────────────────────────────────────────────────────
    private static List<OrderItem> validItems() {
        return List.of(new OrderItem("product-1", 2, new BigDecimal("29.99")));
    }
    private static List<OrderItem> itemsExceedingLimit() {
        return IntStream.range(0, 101)
            .mapToObj(i -> new OrderItem("p" + i, 1, BigDecimal.ONE))
            .toList();
    }
}`,
