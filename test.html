            code: `@ExtendWith(MockitoExtension.class)
@DisplayName("Mockito: Mock / Spy / Captor")
class OrderServiceMockitoTest {

    @Mock  OrderRepository  orderRepo;
    @Mock  EmailService     emailService;
    @Spy   OrderCalculator  calculator = new OrderCalculator();   // SPY: real object
    @Captor ArgumentCaptor<Order>        orderCaptor;
    @Captor ArgumentCaptor<EmailRequest> emailCaptor;
    @InjectMocks OrderService service;

    // ── MOCK: full control, no real method called ────────────────────────────
    @Test
    @DisplayName("mock: verify order is saved with CONFIRMED status")
    void placeOrder_mockRepo_savesConfirmedOrder() {
        when(orderRepo.save(any(Order.class))).thenAnswer(inv -> {
            Order o = inv.getArgument(0);
            o.setId(42L);           // simulate DB-generated ID
            return o;
        });
        service.placeOrder(new OrderRequest("u1", List.of(item("p1", 2, 50))));

        verify(orderRepo).save(orderCaptor.capture());
        Order saved = orderCaptor.getValue();
        assertAll(
            () -> assertThat(saved.getStatus()).isEqualTo(OrderStatus.CONFIRMED),
            () -> assertThat(saved.getUserId()).isEqualTo("u1"),
            () -> assertThat(saved.getTotal()).isEqualByComparingTo("100.00")
        );
    }

    // ── CAPTOR: inspect what was passed to email service ─────────────────────
    @Test
    @DisplayName("captor: email sent to correct address with correct amount")
    void placeOrder_sendsConfirmationEmail_withCorrectDetails() {
        when(orderRepo.save(any())).thenReturn(confirmedOrder());
        service.placeOrder(new OrderRequest("u1", List.of(item("p1", 1, 200))));

        verify(emailService).send(emailCaptor.capture());
        EmailRequest email = emailCaptor.getValue();
        assertAll(
            () -> assertThat(email.getTo()).isEqualTo("u1@example.com"),
            () -> assertThat(email.getSubject()).contains("Order Confirmation"),
            () -> assertThat(email.getBody()).contains("200.00")
        );
    }

    // ── SPY: real method called by default, stub specific method ─────────────
    @Test
    @DisplayName("spy: real calculateTotal() used, but applyVipDiscount() stubbed")
    void placeOrder_vipUser_realCalculatorWithStubbedDiscount() {
        // BAD way with spy → doReturn().when() to avoid calling real method prematurely
        doReturn(new BigDecimal("80.00")).when(calculator).applyVipDiscount(any());

        Order result = service.placeOrderForVip("u1", List.of(item("p1", 1, 100)));

        // Real calculateTotal() was called (not stubbed)
        verify(calculator).calculateTotal(any());          // real method invoked
        verify(calculator).applyVipDiscount(any());        // stubbed: returns 80.00
        assertThat(result.getTotal()).isEqualByComparingTo("80.00");
    }

    // ── verify interaction count and order ───────────────────────────────────
    @Test
    @DisplayName("verify: email sent exactly once, repo saved before email")
    void placeOrder_interactionOrder_repoBeforeEmail() {
        when(orderRepo.save(any())).thenReturn(confirmedOrder());
        service.placeOrder(new OrderRequest("u1", List.of(item("p1", 1, 50))));

        InOrder inOrder = inOrder(orderRepo, emailService);
        inOrder.verify(orderRepo).save(any());          // repo first
        inOrder.verify(emailService).send(any());       // then email
        verify(emailService, times(1)).send(any());     // exactly once
        verify(emailService, never()).sendFailure(any()); // no failure email
    }

    private OrderItem item(String productId, int qty, double price) {
        return new OrderItem(productId, qty, new BigDecimal(price + ""));
    }
    private Order confirmedOrder() {
        Order o = new Order("u1", List.of()); o.setId(1L); o.setStatus(OrderStatus.CONFIRMED);
        return o;
    }
}`,

            code: `// ── @SpringBootTest: full context + MockMvc CRUD flow ───────────────────────
@SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.MOCK)
@AutoConfigureMockMvc
@Testcontainers
@ActiveProfiles("test")
class OrderApiIntegrationTest {

    @Container
    static PostgreSQLContainer<?> postgres = new PostgreSQLContainer<>("postgres:16-alpine")
            .withDatabaseName("orders_test");

    @DynamicPropertySource
    static void configureDb(DynamicPropertyRegistry registry) {
        registry.add("spring.datasource.url",      postgres::getJdbcUrl);
        registry.add("spring.datasource.username", postgres::getUsername);
        registry.add("spring.datasource.password", postgres::getPassword);
    }

    @Autowired MockMvc mockMvc;
    @Autowired ObjectMapper objectMapper;
    @Autowired OrderRepository orderRepository;
    @MockBean  EmailService emailService;   // avoid real email in tests

    private String jwtToken;

    @BeforeEach
    void setUp() {
        orderRepository.deleteAll();       // clean slate per test
        jwtToken = "Bearer " + generateTestJwt("user-1", "ROLE_USER");
    }

    @Test
    @DisplayName("POST /api/orders → 201 with location header")
    void createOrder_validRequest_returns201() throws Exception {
        OrderRequest req = new OrderRequest("user-1",
            List.of(new OrderItem("product-a", 2, new BigDecimal("49.99"))));

        mockMvc.perform(post("/api/orders")
                .header("Authorization", jwtToken)
                .contentType(MediaType.APPLICATION_JSON)
                .content(objectMapper.writeValueAsString(req)))
            .andExpect(status().isCreated())
            .andExpect(header().exists("Location"))
            .andExpect(jsonPath("$.status").value("CONFIRMED"))
            .andExpect(jsonPath("$.total").value(99.98))
            .andExpect(jsonPath("$.orderId").isNotEmpty());

        verify(emailService).sendConfirmation(eq("user-1"), any());
    }

    @Test
    @DisplayName("GET /api/orders/{id} → 200 with correct order data")
    void getOrder_existingId_returns200() throws Exception {
        Order saved = orderRepository.save(
            new Order("user-1", List.of(new OrderItem("p1", 1, new BigDecimal("29.99")))));

        mockMvc.perform(get("/api/orders/" + saved.getId())
                .header("Authorization", jwtToken))
            .andExpect(status().isOk())
            .andExpect(jsonPath("$.userId").value("user-1"))
            .andExpect(jsonPath("$.items[0].productId").value("p1"));
    }

    @Test
    @DisplayName("DELETE /api/orders/{id} → 204, order cancelled in DB")
    void cancelOrder_confirmedOrder_returns204() throws Exception {
        Order saved = orderRepository.save(confirmedOrder("user-1"));

        mockMvc.perform(delete("/api/orders/" + saved.getId())
                .header("Authorization", jwtToken))
            .andExpect(status().isNoContent());

        Order updated = orderRepository.findById(saved.getId()).orElseThrow();
        assertThat(updated.getStatus()).isEqualTo(OrderStatus.CANCELLED);
    }

    @Test
    @DisplayName("POST /api/orders without JWT → 401 Unauthorized")
    void createOrder_missingJwt_returns401() throws Exception {
        mockMvc.perform(post("/api/orders")
                .contentType(MediaType.APPLICATION_JSON)
                .content(objectMapper.writeValueAsString(validRequest())))
            .andExpect(status().isUnauthorized());
    }
}`,

// order-checkout.js
import http from 'k6/http';
import { check, sleep } from 'k6';
import { Rate, Trend } from 'k6/metrics';

// Custom metrics beyond default k6 metrics
const orderSuccessRate  = new Rate('order_success_rate');
const checkoutDuration  = new Trend('checkout_duration_ms', true);

export const options = {
  stages: [
    { duration: '2m', target: 50  },  // ramp-up: 0 → 50 VUs
    { duration: '5m', target: 50  },  // sustained load
    { duration: '1m', target: 200 },  // spike: 50 → 200 VUs
    { duration: '2m', target: 200 },  // hold spike
    { duration: '2m', target: 0   },  // ramp-down
  ],
  thresholds: {
    http_req_duration:    ['p(95)<500',  'p(99)<2000'],  // SLO gates
    http_req_failed:      ['rate<0.01'],                 // <1% errors
    order_success_rate:   ['rate>0.99'],                 // >99% orders created
    checkout_duration_ms: ['p(95)<800'],                 // full checkout < 800ms
  },
};

// Setup: called once — get auth token
export function setup() {
  const res = http.post('https://api.example.com/auth/token', JSON.stringify({
    clientId: 'perf-test', clientSecret: __ENV.CLIENT_SECRET
  }), { headers: { 'Content-Type': 'application/json' } });
  return { token: res.json('access_token') };
}

// Default function: executed by each VU repeatedly
export default function (data) {
  const headers = {
    'Authorization': \`Bearer \${data.token}\`,
    'Content-Type': 'application/json',
  };

  // Step 1: Browse products
  const products = http.get('https://api.example.com/api/products?limit=10', { headers });
  check(products, { 'products 200': r => r.status === 200 });
  const productId = products.json('items.0.id');

  sleep(Math.random() * 2 + 0.5);   // think time: 0.5–2.5s

  // Step 2: Place order (business critical path)
  const startMs = Date.now();
  const order = http.post(
    'https://api.example.com/api/orders',
    JSON.stringify({ userId: \`user-\${__VU}\`, items: [{ productId, quantity: 1 }] }),
    { headers }
  );

  const success = check(order, {
    'order created 201': r => r.status === 201,
    'has orderId':        r => r.json('orderId') !== undefined,
  });
  orderSuccessRate.add(success);
  checkoutDuration.add(Date.now() - startMs);

  sleep(1);  // cool-down between iterations
}

// Teardown: called once after all VUs finish
export function teardown(data) {
  console.log('k6 test complete — check Grafana dashboard for results');
}

public class LegacyConnectionPool {
    private LegacyConnectionPool() {
        // expensive initialization: open DB connections, load config
        loadConfig();
        initPoolConnections();
    }
    // JVM guarantees: Holder is initialized only when getInstance() is first called
    private static class Holder {
        static final LegacyConnectionPool INSTANCE = new LegacyConnectionPool();
    }
    public static LegacyConnectionPool getInstance() { return Holder.INSTANCE; }
}

// ── 4. Classic DCL (Double-Checked Locking) — for educational reference ──────
// Note: volatile is REQUIRED to prevent instruction reorder on multi-core CPUs
public class RateLimiter {
    private static volatile RateLimiter instance;
    private final int maxRps;
    private RateLimiter(int maxRps) { this.maxRps = maxRps; }
    public static RateLimiter getInstance() {
        if (instance == null) {                        // first check (no lock)
            synchronized (RateLimiter.class) {
                if (instance == null) {                // second check (with lock)
                    instance = new RateLimiter(1000);
                }
            }
        }
        return instance;
    }
}

            "currency", req.getCurrency().toLowerCase(),
            "source",   req.getCardToken()

    }
    public PaymentResult refund(String chargeId, BigDecimal amount) { /* ... */ return null; }
}

@Component class PayPalProcessor implements PaymentProcessor {
    public String getProvider() { return "PAYPAL"; }
    public PaymentResult charge(ChargeRequest req) { /* PayPal REST API */ return null; }

@Component class VNPayProcessor implements PaymentProcessor {
    public String getProvider() { return "VNPAY"; }
    public PaymentResult charge(ChargeRequest req) { /* VNPay integration */ return null; }
    public PaymentResult refund(String chargeId, BigDecimal amount) { /* ... */ return null; }

// Step 3: Factory — Spring auto-collects all implementations
@Component
public class PaymentProcessorFactory {
    private final Map<String, PaymentProcessor> registry;

    // Spring injects ALL PaymentProcessor beans — no manual wiring
    public PaymentProcessorFactory(List<PaymentProcessor> processors) {
        this.registry = processors.stream()
            .collect(Collectors.toMap(PaymentProcessor::getProvider, Function.identity()));
        // registry = { "STRIPE": StripeProcessor, "PAYPAL": PayPalProcessor, ... }
    }

    public PaymentProcessor getProcessor(String provider) {
        return Optional.ofNullable(registry.get(provider.toUpperCase()))
            .orElseThrow(() -> new UnsupportedPaymentProviderException(
                "No processor for provider: " + provider +
                ". Supported: " + registry.keySet()));
    }
}

public class PaymentService {
    private final PaymentProcessorFactory factory;

    public PaymentResult processPayment(Order order, String provider) {
        PaymentProcessor processor = factory.getProcessor(provider);
        ChargeRequest request = ChargeRequest.from(order);
        return processor.charge(request);
    }
}

public final class Order {  // immutable
    private final String       userId;
    private final List<OrderItem> items;
    private final String       currency;
    private final BigDecimal   discountPercent;

        this.discountPercent = b.discountPercent;
        this.deliverBy       = b.deliverBy;
    }

    public static class Builder {
        // required fields
        private final String          userId;
        private final List<OrderItem> items;
        // optional fields with defaults
        private String       currency        = "USD";
        private BigDecimal   discountPercent = BigDecimal.ZERO;
        private LocalDateTime deliverBy      = LocalDateTime.now().plusDays(7);

        public Builder(String userId, List<OrderItem> items) {
            this.userId = userId;
            this.items  = items;
        }
        public Builder currency(String c)        { this.currency        = c; return this; }
        public Builder discount(BigDecimal pct)  { this.discountPercent = pct; return this; }
        public Builder deliverBy(LocalDateTime d){ this.deliverBy       = d; return this; }

        public Order build() {
            // Validation in build() — fail fast with clear messages
            if (userId == null || userId.isBlank())
                throw new IllegalStateException("userId is required");
            if (items == null || items.isEmpty())
                throw new IllegalStateException("Order must have at least one item");
            if (discountPercent.compareTo(BigDecimal.ZERO) < 0 ||
                discountPercent.compareTo(new BigDecimal("100")) > 0)
                throw new IllegalStateException("discountPercent must be 0-100");
            if (deliverBy.isBefore(LocalDateTime.now()))
                throw new IllegalStateException("deliverBy must be in the future");
            return new Order(this);
        }
    }
}

@Component
public class DeepCloner {
    private final ObjectMapper mapper;
    public DeepCloner(ObjectMapper mapper) { this.mapper = mapper; }

    public <T> T deepClone(T obj, Class<T> type) {
        try {
            // Serialize → deserialize: simple deep clone for any serializable object
            String json = mapper.writeValueAsString(obj);
            return mapper.readValue(json, type);
        } catch (JsonProcessingException e) {
            throw new IllegalStateException("Deep clone failed for: " + type.getSimpleName(), e);

    }

@Slf4j
class LoggingOrderService implements OrderService {
    private final OrderService delegate;
    LoggingOrderService(OrderService delegate) { this.delegate = delegate; }

    public Order placeOrder(OrderRequest req) {
        log.info("[ORDER] placeOrder start userId={} itemCount={}", req.getUserId(), req.getItemCount());
        long start = System.currentTimeMillis();
        try {
            Order result = delegate.placeOrder(req);
            log.info("[ORDER] placeOrder success orderId={} total={} ms={}",
                result.getId(), result.getTotal(), System.currentTimeMillis() - start);
            return result;
        } catch (Exception e) {
            log.error("[ORDER] placeOrder failed userId={} error={}", req.getUserId(), e.getMessage());
            throw e;
        }
    }
    public Order cancelOrder(Long orderId) {
        log.info("[ORDER] cancelOrder orderId={}", orderId);
        Order result = delegate.cancelOrder(orderId);
        log.info("[ORDER] cancelOrder success status={}", result.getStatus());
        return result;
    }
}

class MetricsOrderService implements OrderService {
    private final OrderService delegate;
    private final MeterRegistry meterRegistry;
    MetricsOrderService(OrderService delegate, MeterRegistry registry) {
        this.delegate = delegate; this.meterRegistry = registry;
    }

    public Order placeOrder(OrderRequest req) {
        return meterRegistry.timer("order.place", "userId", req.getUserId())
            .record(() -> {                                  // wraps real call with timing
                Order order = delegate.placeOrder(req);
                meterRegistry.counter("order.placed", "status", order.getStatus().name()).increment();
                return order;
            });
    }
    public Order cancelOrder(Long orderId) {
        Order result = delegate.cancelOrder(orderId);
        meterRegistry.counter("order.cancelled").increment();
        return result;
    }
}

    private final InventoryService  inventoryService;
    private final PaymentService    paymentService;
    private final EmailService      emailService;

    // Constructor injection
    public CheckoutFacade(InventoryService inv, PaymentService pay,

        this.inventoryService = inv;
        this.paymentService   = pay;
        this.emailService     = email;
        this.orderRepository  = repo;

    @Transactional

        log.info("Checkout start userId={} items={}", request.getUserId(), request.getItemCount());

        if (!reservation.isSuccessful()) {
            throw new InsufficientStockException(reservation.getUnavailableItems());
        }

        try {
            payment = paymentService.charge(ChargeRequest.from(request));
        } catch (PaymentDeclinedException e) {
            inventoryService.release(reservation.getReservationId()); // compensate
            throw e;
        }

            .userId(request.getUserId())
            .items(request.getItems())

@Service
public class PricingService {
    private final Map<String, PricingStrategy> registry;

    // Spring collects ALL PricingStrategy beans and injects as a list
    public PricingService(List<PricingStrategy> strategies) {
        this.registry = strategies.stream()
            .collect(Collectors.toMap(PricingStrategy::customerType, Function.identity()));
        // { "REGULAR": RegularPricing, "VIP": VipPricing, "FLASH_SALE": FlashSalePricing }
    }

    public BigDecimal calculatePrice(Order order) {
        // Find strategy for this order
        PricingStrategy strategy = registry.getOrDefault(
            order.getCustomerType().name(),
            new RegularPricing()  // fallback
        );
        return strategy.calculate(order.getSubtotal());
    }

    // Runtime strategy selection — choose applicable one
    public BigDecimal calculateBestPrice(Order order) {
        return registry.values().stream()
            .filter(s -> s.isApplicable(order))
            .map(s -> s.calculate(order.getSubtotal()))
            .min(Comparator.naturalOrder())            // best (lowest) price for customer
            .orElse(order.getSubtotal());
    }
}

@Slf4j
public abstract class ReportGenerator<T> {

    // Template method — FINAL: subclasses cannot change algorithm order
    public final ReportResult generate(ReportRequest request) {
        log.info("Report generation start type={}", getReportType());

        // Step 1: validate input (hook — override for custom validation)
        validateRequest(request);

        // Step 2: fetch data (abstract — each report knows where to get data)
        List<T> rawData = fetchData(request);
        log.info("Fetched {} records", rawData.size());

        // Step 3: process/aggregate (abstract — business logic varies by report)
        List<T> processedData = processData(rawData, request);

        // Step 4: hook — optional post-processing (default: no-op)
        afterProcessing(processedData, request);

        // Step 5: format/render output (abstract — PDF vs Excel vs CSV)
        byte[] output = render(processedData, request);

        // Step 6: deliver output (hook — override to upload to S3, email, etc.)
        String location = deliver(output, request);

        return new ReportResult(getReportType(), location, rawData.size());
    }

    protected abstract String     getReportType();
    protected abstract List<T>    fetchData(ReportRequest request);
    protected abstract List<T>    processData(List<T> data, ReportRequest request);
    protected abstract byte[]     render(List<T> data, ReportRequest request);

    // Hooks — optional override points with default implementations
    protected void   validateRequest(ReportRequest req) {}  // default: pass
    protected void   afterProcessing(List<T> data, ReportRequest req) {}  // default: no-op
    protected String deliver(byte[] output, ReportRequest req) {
        return "inline";  // default: return directly (not uploaded)
    }
}

    protected void validateRequest(ReportRequest req) {
        if (req.getFrom().isAfter(req.getTo()))
            throw new IllegalArgumentException("from must be before to");
    }

    protected List<SalesRecord> fetchData(ReportRequest req) {
        return orderRepo.findSalesByPeriod(req.getFrom(), req.getTo());

    protected List<SalesRecord> processData(List<SalesRecord> raw, ReportRequest req) {

            .collect(groupingBy(SalesRecord::getCategory, summingLong(SalesRecord::getRevenue)))
            .entrySet().stream()
            .map(e -> new SalesRecord(e.getKey(), e.getValue()))
            .sorted(Comparator.comparingLong(SalesRecord::getRevenue).reversed())
            .toList();
    }

    @Override

        return pdfExporter.exportTable(data, List.of("Category", "Revenue"));
    }

    @Override

        String key = "reports/sales/" + req.getFrom() + "-" + req.getTo() + ".pdf";
        return s3.upload(key, pdf);   // returns S3 URL
    }
}

@Service
public class OrderCommandHistory {
    private final Deque<OrderCommand> history = new ArrayDeque<>();
    private final AuditLogRepository  auditLog;

    public void execute(OrderCommand command) {
        command.execute();
        history.push(command);
        auditLog.record(command.describe(), "EXECUTED");  // audit trail
    }

    public void undo() {
        if (history.isEmpty()) throw new IllegalStateException("Nothing to undo");
        OrderCommand last = history.pop();
        last.undo();
        auditLog.record(last.describe(), "UNDONE");
    }

    public List<String> getHistory() {
        return history.stream().map(OrderCommand::describe).toList();
    }
}

            code: `// ── Validator interface: each handler validates one concern ──────────────────
public interface OrderValidator {
    ValidationResult validate(Order order);
    void setNext(OrderValidator next);     // chain link
}

// ── Abstract base: handle chaining boilerplate ────────────────────────────────
public abstract class AbstractOrderValidator implements OrderValidator {
    private OrderValidator next;

    @Override
    public void setNext(OrderValidator next) { this.next = next; }

    // Template: validate self, then pass to next if valid
    protected ValidationResult passOrStop(Order order, ValidationResult myResult) {
        if (!myResult.isValid()) return myResult;                     // stop chain on failure
        return next != null ? next.validate(order) : myResult;        // continue if next exists
    }
}

// ── Handler 1: Stock Validator ────────────────────────────────────────────────
@Component
public class StockValidator extends AbstractOrderValidator {
    private final InventoryService inventoryService;

    @Override
    public ValidationResult validate(Order order) {
        for (OrderItem item : order.getItems()) {
            int available = inventoryService.getAvailableStock(item.getProductId());
            if (available < item.getQuantity()) {
                return ValidationResult.fail(
                    "Insufficient stock for product " + item.getProductId() +
                    ": requested " + item.getQuantity() + ", available " + available);
            }
        }
        return passOrStop(order, ValidationResult.ok());
    }
}

// ── Handler 2: Fraud Validator ────────────────────────────────────────────────
@Component
public class FraudValidator extends AbstractOrderValidator {
    private final FraudDetectionService fraudService;

    @Override
    public ValidationResult validate(Order order) {
        FraudScore score = fraudService.evaluate(order.getUserId(), order.getTotal(),
                                                  order.getShippingAddress());
        if (score.getRisk() == RiskLevel.HIGH) {
            return ValidationResult.fail("Order flagged as high fraud risk: score=" + score.getScore());
        }
        if (score.getRisk() == RiskLevel.MEDIUM) {
            // Allow but flag for manual review
            order.setFlag("FRAUD_REVIEW");
        }
        return passOrStop(order, ValidationResult.ok());
    }
}

// ── Handler 3: Payment Validator ──────────────────────────────────────────────
@Component
public class PaymentValidator extends AbstractOrderValidator {
    private final UserService userService;

    @Override
    public ValidationResult validate(Order order) {
        User user = userService.findById(order.getUserId());
        if (!user.hasValidPaymentMethod()) {
            return ValidationResult.fail("No valid payment method on file for user " + order.getUserId());
        }
        if (order.getTotal().compareTo(user.getCreditLimit()) > 0) {
            return ValidationResult.fail("Order total exceeds credit limit: " +
                order.getTotal() + " > " + user.getCreditLimit());
        }
        return passOrStop(order, ValidationResult.ok());
    }
}

// ── Chain builder: assemble the validation pipeline ───────────────────────────
@Service
public class OrderValidationChain {
    private final OrderValidator chain;

    public OrderValidationChain(StockValidator stock,
                                 FraudValidator  fraud,
                                 PaymentValidator payment) {
        // Build chain: Stock → Fraud → Payment
        stock.setNext(fraud);
        fraud.setNext(payment);
        this.chain = stock;   // entry point
    }

    public ValidationResult validate(Order order) {
        return chain.validate(order);    // starts at Stock, passes through each
    }
}

// ── Usage in OrderService ─────────────────────────────────────────────────────
@Service
public class OrderService {
    private final OrderValidationChain validationChain;

    @Transactional
    public Order placeOrder(OrderRequest req) {
        Order order = Order.from(req);
        ValidationResult result = validationChain.validate(order);
        if (!result.isValid()) {
            throw new OrderValidationException(result.getMessage());
        }
        return orderRepo.save(order);
    }
}

ServerSocketChannel server = ServerSocketChannel.open();

server.register(selector, SelectionKey.OP_ACCEPT);

while (true) {
    selector.select(); // block cho đến khi có ít nhất 1 channel sẵn sàng
    Iterator<SelectionKey> it = selector.selectedKeys().iterator();
    while (it.hasNext()) {
        SelectionKey key = it.next(); it.remove();
        if (key.isAcceptable()) {
            SocketChannel client = server.accept();
            client.configureBlocking(false);
            client.register(selector, SelectionKey.OP_READ);
        } else if (key.isReadable()) {
            SocketChannel ch = (SocketChannel) key.channel();
            ByteBuffer buf = ByteBuffer.allocate(1024);
            ch.read(buf);
            buf.flip(); // chuyển sang read mode
            // xử lý buf.array()[0..buf.limit()]
        }
    }
}`,

            code: `// Pool riêng theo concern — Bulkhead pattern
@Configuration
public class AsyncConfig {

    @Bean("dbPool")
    public ThreadPoolTaskExecutor dbPool() {
        ThreadPoolTaskExecutor ex = new ThreadPoolTaskExecutor();
        // 4 cores × (1 + 100ms wait / 10ms compute) = 44 → làm tròn 40
        ex.setCorePoolSize(40);
        ex.setMaxPoolSize(60);
        ex.setQueueCapacity(200);     // bounded — reject khi đầy
        ex.setThreadNamePrefix("db-");
        // CallerRunsPolicy: nếu queue đầy, caller thread tự thực thi task → natural backpressure
        ex.setRejectedExecutionHandler(new ThreadPoolExecutor.CallerRunsPolicy());
        ex.initialize();
        return ex;
    }

    @Bean("emailPool")
    public ThreadPoolTaskExecutor emailPool() {
        ThreadPoolTaskExecutor ex = new ThreadPoolTaskExecutor();
        ex.setCorePoolSize(5);
        ex.setMaxPoolSize(10);
        ex.setQueueCapacity(5000);   // queue lớn OK — email không nhạy cảm latency

        function buildNav() {
            const nav = document.getElementById('nav');

                grp.className = 'nav-group';

                grp.appendChild(catEl);

                items.className = 'nav-items';

                cat.topics.forEach(tp => {
                    const hasSubs = tp.subs.length > 0;
                    const tpEl = document.createElement('div');
                    tpEl.className = 'nav-topic' + (hasSubs ? ' has-subs' : '');
                    tpEl.dataset.key = tp.name;
                    tpEl.innerHTML = `${hasSubs ? '<span class="nav-tp-arrow">›</span>' : ''}<span class="nav-tp-name">${tp.name}</span>`;
                    tpEl.onclick = e => {
                        if (hasSubs && e.target.classList.contains('nav-tp-arrow')) { tpEl.classList.toggle('sub-open'); return }
                        showDetail(cat.title, tp.name);
                        if (hasSubs) tpEl.classList.add('sub-open');
                    };
                    items.appendChild(tpEl);

                    if (hasSubs) {
                        const subList = document.createElement('div');
                        subList.className = 'nav-subs';
                        tp.subs.forEach(sub => {
                            const subEl = document.createElement('div');
                            subEl.className = 'nav-sub';
                            subEl.dataset.key = sub;
                            subEl.textContent = sub;
                            subEl.onclick = () => showDetail(cat.title + ' › ' + tp.name, sub);

                        });
                        items.appendChild(subList);
                    }
                });

                grp.appendChild(items);
                nav.appendChild(grp);
            });

        // ── DETAIL RENDER ────────────────────────────────────────────────────────────
        let activeKey = null;
        function lookupDetail(name) {
            if (DETAIL[name]) return DETAIL[name];
            for (const k of Object.keys(DETAIL)) { if (k.toLowerCase() === name.toLowerCase()) return DETAIL[k]; }
            return null;
        }

        function showDetail(crumb, name) {
            activeKey = name;
            document.querySelectorAll('.nav-topic,.nav-sub').forEach(el => {

  `;
            el.scrollTop = 0;
        }

        // ── SYNTAX HIGHLIGHT ────────────────────────────────────────────────────────
        function hl(code) {
            let s = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const kw = 'abstract|assert|boolean|break|byte|case|catch|char|class|const|continue|default|do|double|else|enum|extends|final|finally|float|for|if|implements|import|instanceof|int|interface|long|native|new|package|private|protected|public|return|short|static|super|switch|synchronized|this|throw|throws|transient|try|var|void|volatile|while|true|false|null|record|sealed';
            const types = 'String|List|Map|Set|Optional|Object|Integer|Long|Boolean|Double|Thread|Runnable|Callable|Future|CompletableFuture|AtomicInteger|AtomicLong|ExecutorService|ReentrantLock|Lock|Collection|ArrayList|HashMap|LinkedList|TreeMap|Queue|Deque|ArrayDeque';
            // 1. Keywords & types first — on raw escaped text before any spans are inserted
            s = s.replace(new RegExp('\\b(' + kw + ')\\b', 'g'), "<span class='c-kw'>$1</span>");
            s = s.replace(new RegExp('\\b(' + types + ')\\b', 'g'), "<span class='c-type'>$1</span>");
            // 2. Annotations
            s = s.replace(/(@\w+)/g, "<span class='c-ann'>$1</span>");
            // 3. Numbers
            s = s.replace(/\b(\d+(?:\.\d+)?[Ld]?)\b/g, "<span class='c-num'>$1</span>");
            // 4. Strings — /"..."/ won't match single-quoted span attrs from steps 1-3
            s = s.replace(/("(?:[^"\\]|\\.)*")/g, "<span class='c-str'>$1</span>");
            // 5. Comments last — wrap whole line; all span attrs use single quotes so no interference
            s = s.replace(/(\/\/[^\n]*)/g, "<span class='c-cmt'>$1</span>");
            s = s.replace(/(\/\*[\s\S]*?\*\/)/g, "<span class='c-cmt'>$1</span>");
            s = s.replace(/(#[^\n]*)/g, "<span class='c-cmt'>$1</span>");
            return s;
        }

        // ── SEARCH ───────────────────────────────────────────────────────────────────
        function doSearch(q) {
            q = q.toLowerCase().trim();
            document.querySelectorAll('.nav-group').forEach(grp => {
                const ci = +grp.dataset.ci;
                const cat = TOPICS[ci];
                let groupVisible = false;
                grp.querySelectorAll('.nav-topic').forEach((tpEl, ti) => {
                    const tp = cat.topics[ti];
                    const tpMatch = !q || tp.name.toLowerCase().includes(q) || cat.title.toLowerCase().includes(q);
                    const subEls = tpEl.nextElementSibling?.classList.contains('nav-subs') ? tpEl.nextElementSibling : null;
                    let anySubMatch = false;
                    if (subEls) {
                        subEls.querySelectorAll('.nav-sub').forEach((subEl, si) => {
                            const sub = tp.subs[si];
                            const m = !q || sub.toLowerCase().includes(q) || tp.name.toLowerCase().includes(q) || cat.title.toLowerCase().includes(q);
                            subEl.classList.toggle('nav-hidden', !m);
                            if (m) anySubMatch = true;
                        });
                    }
                    const show = tpMatch || anySubMatch;
                    tpEl.classList.toggle('nav-hidden', !show);
                    if (show) groupVisible = true;
                    if (q && anySubMatch) tpEl.classList.add('sub-open');
                });
                grp.classList.toggle('nav-hidden', !groupVisible);
                if (q && groupVisible) grp.classList.add('open');
            });
        }

        buildNav();
    </script>
